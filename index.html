<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扣哒世界 - 奇妙教研岛</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Zcool+KuaiLe&display=swap" rel="stylesheet">
    <style>
        /* --- 基础设置 --- */
        :root {
            --bg-sky: #87CEEB;
            --text-main: #5D4037;
            --btn-bg: #FFD54F;
            --btn-shadow: #FFA000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Zcool KuaiLe', 'Fredoka One', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-sky);
            /* 柔和的圆形光斑背景 */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: var(--text-main);
            display: flex; /* 使用 Flexbox 实现绝对居中 */
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
        }

        /* --- 漂浮的云朵背景 --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            z-index: 0;
            animation: floatCloud linear infinite;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        /* 分布在屏幕不同位置 */
        .c1 { width: 160px; height: 70px; top: 10%; left: -160px; animation-duration: 35s; }
        .c2 { width: 100px; height: 50px; top: 25%; left: -100px; animation-duration: 25s; animation-delay: 5s; }
        .c3 { width: 200px; height: 90px; top: 60%; left: -200px; animation-duration: 40s; animation-delay: 2s; }
        .c4 { width: 120px; height: 60px; top: 80%; left: -120px; animation-duration: 30s; animation-delay: 10s; }

        @keyframes floatCloud {
            0% { transform: translateX(-250px); }
            100% { transform: translateX(110vw); }
        }

        /* --- 顶部 Logo 栏 (左上角) --- */
        .top-badge {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #FFF;
            z-index: 20;
        }
        .logo-icon { font-size: 1.5rem; margin-right: 10px; }
        .logo-text { font-size: 1.1rem; color: #455A64; letter-spacing: 1px; }

        /* --- 中央内容区 --- */
        .center-stage {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center; /* 确保子元素水平居中 */
            animation: floatUp 3s ease-in-out infinite;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 大标题 */
        .main-title {
            font-size: 4rem;
            line-height: 1.3;
            margin-bottom: 10px;
            /* 彩虹渐变字 */
            background: linear-gradient(45deg, #FF6B6B, #FFD93D, #4D96FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* 文字描边效果 */
            filter: drop-shadow(4px 4px 0px #FFF);
            position: relative;
        }

        /* 标题两侧的装饰图标 */
        .deco-icon {
            display: inline-block;
            font-size: 3rem;
            vertical-align: middle;
            margin: 0 15px;
            animation: spin 8s linear infinite;
        }
        .deco-right { animation-direction: reverse; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 副标题 */
        .sub-title {
            font-size: 1.4rem;
            background: rgba(255,255,255,0.6);
            color: #455a64;
            padding: 8px 30px;
            border-radius: 20px;
            margin-bottom: 50px;
            border: 2px solid rgba(255,255,255,0.8);
        }

        /* 出发按钮 */
        .start-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 4px solid #FFF;
            padding: 15px 80px; /* 宽大的按钮 */
            font-size: 2rem;
            border-radius: 50px;
            font-family: inherit;
            cursor: pointer;
            /* 立体阴影 */
            box-shadow: 0 8px 0 var(--btn-shadow), 0 15px 20px rgba(0,0,0,0.15);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            top: 0;
        }

        .start-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.05);
        }

        .start-btn:active {
            top: 8px; /* 按下位移 */
            box-shadow: 0 0 0 var(--btn-shadow), 0 5px 5px rgba(0,0,0,0.1);
            transform: scale(0.98);
        }

        /* 页面切换动画 */
        .zoom-out {
            transform: scale(2);
            opacity: 0;
            transition: all 0.5s ease-in;
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .main-title { font-size: 2.5rem; }
            .deco-icon { font-size: 2rem; margin: 0 5px; }
            .start-btn { font-size: 1.6rem; padding: 12px 60px; }
        }
    </style>
</head>
<body>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>

    <div class="top-badge">
        <span class="logo-icon">🏰</span>
        <span class="logo-text">扣哒世界 · 教研岛</span>
    </div>

    <div class="center-stage" id="stage">
        <h1 class="main-title">
            <span class="deco-icon">✨</span>
            奇妙教研岛
            <span class="deco-icon deco-right">🚀</span>
        </h1>
        <p class="sub-title">本网站只能老师使用哦</p>
        
        <button class="start-btn" onclick="enterMap()">出 发 !</button>
    </div>

    <script>
        function enterMap() {
            const stage = document.getElementById('stage');
            // 添加放大消失动画
            stage.classList.add('zoom-out');
            
            // 动画结束后跳转
            setTimeout(() => {
                window.location.href = 'menu.html';
            }, 450);
        }
    </script>
</body>
</html>
