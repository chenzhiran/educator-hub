<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D第一视角枪战游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            pointer-events: none;
        }
        
        #healthBar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 5px;
            overflow: hidden;
        }
        
        #healthFill {
            height: 100%;
            width: 100%;
            background-color: #ff3333;
            transition: width 0.3s;
        }
        
        #ammoDisplay {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        
        #weaponDisplay {
            position: absolute;
            bottom: 80px;
            right: 30px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff5555;
            text-shadow: 0 0 10px rgba(255, 85, 85, 0.7);
        }
        
        #startScreen p {
            font-size: 20px;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #ff5555;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
        }
        
        #startButton:hover {
            background-color: #ff3333;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        
        #gameOverScreen h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff5555;
        }
        
        #killCount {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        
        #bossHealth {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 5px;
            overflow: hidden;
            display: none;
        }
        
        #bossHealthFill {
            height: 100%;
            width: 100%;
            background-color: #5555ff;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div id="crosshair"></div>
            <div id="healthBar">
                <div id="healthFill"></div>
            </div>
            <div id="ammoDisplay">M4A1: 30/90</div>
            <div id="weaponDisplay">主武器: M4A1突击步枪</div>
            <div id="killCount">击杀: 0</div>
            <div id="bossHealth">
                <div id="bossHealthFill"></div>
            </div>
        </div>
        
        <div id="startScreen">
            <h1>三角洲行动</h1>
            <p>欢迎来到3D第一视角枪战游戏！在这个任务中，您将扮演一名精英干员，深入敌后消灭恐怖分子并击败最终BOSS。</p>
            <p>操作说明：<br>
            WASD - 移动<br>
            鼠标 - 瞄准<br>
            左键 - 射击<br>
            R - 装弹<br>
            空格 - 跳跃<br>
            E - 互动</p>
            <button id="startButton">开始任务</button>
        </div>
        
        <div id="gameOverScreen">
            <h2 id="gameResult">任务失败</h2>
            <p id="finalScore">击杀数: 0</p>
            <button id="restartButton">重新开始</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 游戏状态
        let gameStarted = false;
        let playerHealth = 100;
        let currentAmmo = 30;
        let totalAmmo = 90;
        let kills = 0;
        let enemies = [];
        let boss = null;
        let bossActive = false;
        let bossHealth = 500;
        
        // Three.js 相关变量
        let scene, camera, renderer;
        let player, enemy, bossModel;
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = true;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let raycaster = new THREE.Raycaster();
        let objects = [];
        
        // 初始化游戏
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x88ccff);
            scene.fog = new THREE.Fog(0x88ccff, 0, 500);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // 模拟人眼高度
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('gameContainer').appendChild(renderer.domElement);
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0x606060);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 0.5).normalize();
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // 创建地面
            const groundGeometry = new THREE.PlaneGeometry(100, 100, 20, 20);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2e8b57,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 创建建筑物
            createBuildings();
            
            // 创建玩家
            player = new THREE.Object3D();
            player.position.set(0, 1.6, 0);
            scene.add(player);
            player.add(camera);
            
            // 创建敌人
            createEnemies();
            
            // 创建BOSS
            createBoss();
            
            // 添加事件监听器
            setupEventListeners();
            
            // 开始渲染循环
            animate();
        }
        
        function createBuildings() {
            // 创建几个建筑物
            const buildingGeometry = new THREE.BoxGeometry(10, 10, 10);
            const buildingMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8b8c89,
                roughness: 0.7,
                metalness: 0.3
            });
            
            // 建筑物1
            const building1 = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building1.position.set(15, 5, 15);
            building1.castShadow = true;
            building1.receiveShadow = true;
            scene.add(building1);
            objects.push(building1);
            
            // 建筑物2
            const building2 = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building2.position.set(-15, 5, -15);
            building2.castShadow = true;
            building2.receiveShadow = true;
            scene.add(building2);
            objects.push(building2);
            
            // 建筑物3
            const building3 = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building3.position.set(15, 5, -15);
            building3.castShadow = true;
            building3.receiveShadow = true;
            scene.add(building3);
            objects.push(building3);
            
            // 建筑物4
            const building4 = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building4.position.set(-15, 5, 15);
            building4.castShadow = true;
            building4.receiveShadow = true;
            scene.add(building4);
            objects.push(building4);
            
            // 墙壁
            const wallGeometry = new THREE.BoxGeometry(20, 3, 1);
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x696969,
                roughness: 0.7,
                metalness: 0.3
            });
            
            const wall1 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall1.position.set(0, 1.5, 10);
            wall1.castShadow = true;
            wall1.receiveShadow = true;
            scene.add(wall1);
            objects.push(wall1);
            
            const wall2 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall2.position.set(0, 1.5, -10);
            wall2.castShadow = true;
            wall2.receiveShadow = true;
            scene.add(wall2);
            objects.push(wall2);
        }
        
        function createEnemies() {
            // 使用圆柱体代替胶囊体
            const enemyGeometry = new THREE.CylinderGeometry(0.5, 0.5, 2, 16); // 圆柱体代表敌人身体
            const enemyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff5555,
                roughness: 0.7,
                metalness: 0.3
            });
            
            // 创建5个敌人
            for (let i = 0; i < 5; i++) {
                const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
                
                // 随机位置，避开玩家初始位置
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 40;
                    z = (Math.random() - 0.5) * 40;
                } while (Math.abs(x) < 5 && Math.abs(z) < 5);
                
                enemy.position.set(x, 1, z);
                enemy.castShadow = true;
                scene.add(enemy);
                
                // 存储敌人信息
                enemies.push({
                    mesh: enemy,
                    health: 100,
                    speed: 0.02 + Math.random() * 0.02,
                    lastShot: 0
                });
            }
        }
        
        function createBoss() {
            const bossGeometry = new THREE.ConeGeometry(1.5, 4, 8);
            const bossMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x5555ff,
                roughness: 0.7,
                metalness: 0.3
            });
            
            bossModel = new THREE.Mesh(bossGeometry, bossMaterial);
            bossModel.position.set(0, 2, 25);
            bossModel.castShadow = true;
            scene.add(bossModel);
            
            boss = {
                mesh: bossModel,
                health: bossHealth,
                speed: 0.01,
                lastShot: 0,
                active: false
            };
        }
        
        function setupEventListeners() {
            // 键盘事件
            document.addEventListener('keydown', (event) => {
                if (!gameStarted) return;
                
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump) velocity.y = 0.15; canJump = false; break;
                    case 'KeyR': reload(); break;
                }
            });
            
            document.addEventListener('keyup', (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });
            
            // 鼠标事件 - 射击
            document.addEventListener('mousedown', (event) => {
                if (!gameStarted || event.button !== 0) return;
                shoot();
            });
            
            // 鼠标锁定
            document.addEventListener('click', () => {
                if (gameStarted) {
                    renderer.domElement.requestPointerLock();
                }
            });
            
            // 鼠标移动 - 瞄准
            document.addEventListener('mousemove', (event) => {
                if (!gameStarted || !document.pointerLockElement) return;
                
                camera.rotation.y -= event.movementX * 0.002;
                camera.rotation.x -= event.movementY * 0.002;
                
                // 限制上下视角
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            });
            
            // 开始按钮
            document.getElementById('startButton').addEventListener('click', startGame);
            
            // 重新开始按钮
            document.getElementById('restartButton').addEventListener('click', restartGame);
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameStarted = true;
            renderer.domElement.requestPointerLock();
        }
        
        function restartGame() {
            // 重置游戏状态
            playerHealth = 100;
            currentAmmo = 30;
            totalAmmo = 90;
            kills = 0;
            bossHealth = 500;
            boss.active = false;
            document.getElementById('bossHealth').style.display = 'none';
            
            // 更新UI
            updateUI();
            
            // 重置玩家位置
            player.position.set(0, 1.6, 0);
            camera.rotation.set(0, 0, 0);
            
            // 重新创建敌人
            enemies.forEach(enemy => scene.remove(enemy.mesh));
            enemies = [];
            createEnemies();
            
            // 重置BOSS
            bossModel.position.set(0, 2, 25);
            boss.health = bossHealth;
            
            // 显示游戏结束屏幕
            document.getElementById('gameOverScreen').style.display = 'none';
            gameStarted = true;
            renderer.domElement.requestPointerLock();
        }
        
        function shoot() {
            if (currentAmmo <= 0) {
                // 没子弹了
                return;
            }
            
            currentAmmo--;
            updateUI();
            
            // 射线检测
            raycaster.setFromCamera(new THREE.Vector2(), camera);
            const intersects = raycaster.intersectObjects(scene.children);
            
            // 检查是否击中敌人
            for (const enemy of enemies) {
                // 使用射线与球体相交检测（模拟敌人碰撞体积）
                if (raycaster.ray.intersectSphere(
                    new THREE.Sphere(enemy.mesh.position, 1), 
                    new THREE.Vector3()
                )) {
                    enemy.health -= 34; // M4A1伤害
                    if (enemy.health <= 0) {
                        scene.remove(enemy.mesh);
                        enemies.splice(enemies.indexOf(enemy), 1);
                        kills++;
                        updateUI();
                        
                        // 检查是否所有普通敌人都被消灭，激活BOSS
                        if (enemies.length === 0 && !boss.active) {
                            activateBoss();
                        }
                    }
                    break;
                }
            }
            
            // 检查是否击中BOSS
            if (boss.active) {
                if (raycaster.ray.intersectSphere(
                    new THREE.Sphere(boss.mesh.position, 2), 
                    new THREE.Vector3()
                )) {
                    boss.health -= 34; // M4A1伤害
                    updateBossHealth();
                    
                    if (boss.health <= 0) {
                        // BOSS被击败
                        scene.remove(boss.mesh);
                        endGame(true);
                    }
                }
            }
        }
        
        function activateBoss() {
            boss.active = true;
            document.getElementById('bossHealth').style.display = 'block';
            updateBossHealth();
        }
        
        function updateBossHealth() {
            const bossHealthPercent = (boss.health / bossHealth) * 100;
            document.getElementById('bossHealthFill').style.width = `${bossHealthPercent}%`;
        }
        
        function reload() {
            if (totalAmmo <= 0 || currentAmmo === 30) return;
            
            const neededAmmo = 30 - currentAmmo;
            const ammoToReload = Math.min(neededAmmo, totalAmmo);
            
            currentAmmo += ammoToReload;
            totalAmmo -= ammoToReload;
            
            updateUI();
        }
        
        function updateUI() {
            // 更新血条
            document.getElementById('healthFill').style.width = `${playerHealth}%`;
            
            // 更新弹药显示
            document.getElementById('ammoDisplay').textContent = `M4A1: ${currentAmmo}/${totalAmmo}`;
            
            // 更新击杀数
            document.getElementById('killCount').textContent = `击杀: ${kills}`;
        }
        
        function endGame(victory) {
            gameStarted = false;
            document.exitPointerLock();
            
            const gameOverScreen = document.getElementById('gameOverScreen');
            const resultText = victory ? '任务完成！' : '任务失败！';
            const resultColor = victory ? '#55ff55' : '#ff5555';
            
            document.getElementById('gameResult').textContent = resultText;
            document.getElementById('gameResult').style.color = resultColor;
            document.getElementById('finalScore').textContent = `击杀数: ${kills}`;
            
            gameOverScreen.style.display = 'flex';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameStarted) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;
                
                // 更新玩家移动
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 15.0 * delta; // 重力
                
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                
                if (moveForward || moveBackward) velocity.z -= direction.z * 20.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 20.0 * delta;
                
                // 移动玩家
                player.translateX(velocity.x * delta);
                player.translateY(velocity.y * delta);
                player.translateZ(velocity.z * delta);
                
                // 碰撞检测（简化版）
                if (player.position.y < 1.6) {
                    velocity.y = 0;
                    player.position.y = 1.6;
                    canJump = true;
                }
                
                // 边界检测
                player.position.x = Math.max(-45, Math.min(45, player.position.x));
                player.position.z = Math.max(-45, Math.min(45, player.position.z));
                
                // 更新敌人AI
                updateEnemies(delta);
                
                // 更新BOSS AI
                if (boss.active) {
                    updateBoss(delta);
                }
                
                prevTime = time;
            }
            
            renderer.render(scene, camera);
        }
        
        function updateEnemies(delta) {
            for (const enemy of enemies) {
                // 简单AI：向玩家方向移动
                const direction = new THREE.Vector3();
                direction.subVectors(player.position, enemy.mesh.position).normalize();
                
                enemy.mesh.position.add(direction.multiplyScalar(enemy.speed));
                
                // 限制敌人活动范围
                enemy.mesh.position.x = Math.max(-40, Math.min(40, enemy.mesh.position.x));
                enemy.mesh.position.z = Math.max(-40, Math.min(40, enemy.mesh.position.z));
                
                // 敌人射击（概率性）
                if (Math.random() < 0.01) {
                    const now = Date.now();
                    if (now - enemy.lastShot > 1000) { // 每秒最多射击一次
                        // 模拟敌人射击玩家
                        const distance = player.position.distanceTo(enemy.mesh.position);
                        if (distance < 15) { // 在射程内
                            playerHealth -= 10; // 敌人伤害
                            updateUI();
                            
                            if (playerHealth <= 0) {
                                endGame(false);
                            }
                        }
                        enemy.lastShot = now;
                    }
                }
            }
        }
        
        function updateBoss(delta) {
            // BOSS AI：向玩家方向移动，但速度较慢
            const direction = new THREE.Vector3();
            direction.subVectors(player.position, boss.mesh.position).normalize();
            
            boss.mesh.position.add(direction.multiplyScalar(boss.speed));
            
            // 限制BOSS活动范围
            boss.mesh.position.x = Math.max(-30, Math.min(30, boss.mesh.position.x));
            boss.mesh.position.z = Math.max(15, Math.min(40, boss.mesh.position.z)); // BOSS只在远处
            
            // BOSS射击（概率性，伤害更高）
            if (Math.random() < 0.02) {
                const now = Date.now();
                if (now - boss.lastShot > 800) { // 每0.8秒最多射击一次
                    const distance = player.position.distanceTo(boss.mesh.position);
                    if (distance < 25) { // 在射程内
                        playerHealth -= 25; // BOSS伤害更高
                        updateUI();
                        
                        if (playerHealth <= 0) {
                            endGame(false);
                        }
                    }
                    boss.lastShot = now;
                }
            }
        }
        
        // 启动游戏
        window.onload = init;
    </script>
</body>
</html>
