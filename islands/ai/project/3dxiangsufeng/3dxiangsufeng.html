<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Cube Craft - 纯净漫游版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #BFDBFE;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            margin-top: -5px;
            margin-left: -5px;
            border: 2px solid white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 100;
        }

        #hud_guide {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.5;
            z-index: 10;
            pointer-events: none;
        }
        #hud_guide b { color: #86EFAC; }

        #pause_overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0,0,0,0.5);
            color: white;
            z-index: 20;
            cursor: pointer;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="hud_guide">
        <b>W,A,S,D / 方向键</b>: 移动<br/>
        <b>SPACE</b>: 跳跃<br/>
        <b>鼠标移动</b>: 旋转视角<br/>
        <b>ESC</b>: 释放鼠标
    </div>

    <div id="pause_overlay">
        <h1>点击屏幕开始游玩</h1>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 全局变量 ---
        let camera, scene, renderer, controls;
        let audioCtx; 

        // 移动控制变量
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // 核心设置 (大地图)
        const blockSize = 50; 
        const worldSize = 60; 
        const cubeGeo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);

        // --- 动态生成像素纹理 ---
        function createPixelTexture(size, colorConfigs) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext('2d');
            context.imageSmoothingEnabled = false; 

            const pixelSize = size / 16; 

            for (let x = 0; x < size; x += pixelSize) {
                for (let y = 0; y < size; y += pixelSize) {
                    const config = colorConfigs[Math.floor(Math.random() * colorConfigs.length)];
                    const lightnessChange = (Math.random() - 0.5) * 10;
                    context.fillStyle = `hsl(${config.h}, ${config.s}%, ${config.l + lightnessChange}%)`;
                    context.fillRect(x, y, pixelSize, pixelSize);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; 
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        // 定义材质颜色
        const greenGrass = { h: 100, s: 60, l: 40 };
        const brownDirt = { h: 25, s: 50, l: 30 };
        const stoneGrey = { h: 0, s: 0, l: 45 }; 
        const treeLogSide = { h: 25, s: 40, l: 25 };
        const treeLogTop = { h: 25, s: 30, l: 35 };
        const treeLeaves = { h: 120, s: 50, l: 25 };
        const pinkFlower = { h: 320, s: 70, l: 60 }; 

        const texGrassTop = createPixelTexture(64, [greenGrass]);
        const texDirt = createPixelTexture(64, [brownDirt]);
        const texStone = createPixelTexture(64, [stoneGrey]);
        const texLogSide = createPixelTexture(64, [treeLogSide]);
        const texLogTop = createPixelTexture(64, [treeLogTop]);
        const texLeaves = createPixelTexture(64, [treeLeaves]);
        const texFlower = createPixelTexture(64, [pinkFlower]);

        const matGrassBlock = [
            new THREE.MeshLambertMaterial({ map: texDirt }),    
            new THREE.MeshLambertMaterial({ map: texDirt }),    
            new THREE.MeshLambertMaterial({ map: texGrassTop }),
            new THREE.MeshLambertMaterial({ map: texDirt }),    
            new THREE.MeshLambertMaterial({ map: texDirt }),    
            new THREE.MeshLambertMaterial({ map: texDirt })     
        ];
        const matStone = new THREE.MeshLambertMaterial({ map: texStone });
        const matFlower = new THREE.MeshLambertMaterial({ map: texFlower });
        const matLog = [
            new THREE.MeshLambertMaterial({ map: texLogSide }), 
            new THREE.MeshLambertMaterial({ map: texLogSide }), 
            new THREE.MeshLambertMaterial({ map: texLogTop }),  
            new THREE.MeshLambertMaterial({ map: texLogTop }),  
            new THREE.MeshLambertMaterial({ map: texLogSide }), 
            new THREE.MeshLambertMaterial({ map: texLogSide })  
        ];
        const matLeaves = new THREE.MeshLambertMaterial({ map: texLeaves, transparent: true, opacity: 0.95 });

        // 生成跳跃声音
        function playSound(frequency, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type; 
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                // 静默失败
            }
        }

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xBFDBFE); 
            scene.fog = new THREE.Fog(0xBFDBFE, blockSize * 10, blockSize * worldSize);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, blockSize * worldSize * 2);
            // 人物开始的视角稍高
            camera.position.set(0, blockSize * 18, 0); 

            scene.add(new THREE.AmbientLight(0xeeeeee)); 
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(1, 1, 0.5).normalize();
            scene.add(directionalLight);

            controls = new PointerLockControls(camera, document.body);
            const pauseOverlay = document.getElementById('pause_overlay');

            pauseOverlay.addEventListener('click', function () {
                window.focus(); // 强制窗口获取焦点，防止按键被拦截
                controls.lock();
            });
            controls.addEventListener('lock', function () {
                pauseOverlay.style.display = 'none';
            });
            controls.addEventListener('unlock', function () {
                pauseOverlay.style.display = 'flex';
                // 重置移动状态
                moveForward = false;
                moveBackward = false;
                moveLeft = false;
                moveRight = false;
            });
            scene.add(controls.getObject());

            buildWorld();

            // 将键盘事件绑定到最高层级的 window，防止丢失焦点
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            // 禁用了原生的右键菜单
            window.addEventListener('contextmenu', e => e.preventDefault()); 

            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', onWindowResize);
        }

        function buildWorld() {
            const halfSize = worldSize / 2;
            
            for (let i = -halfSize; i < halfSize; i++) {
                for (let j = -halfSize; j < halfSize; j++) {
                    const posX = i * blockSize;
                    const posZ = j * blockSize;
                    
                    const voxel = new THREE.Mesh(cubeGeo, matGrassBlock);
                    voxel.position.set(posX, 0, posZ);
                    voxel.position.divideScalar(blockSize).floor().multiplyScalar(blockSize).addScalar(blockSize / 2);
                    scene.add(voxel);

                    const randomVal = Math.random();
                    if (randomVal < 0.03) {
                        createSingleBlock(posX, blockSize, posZ, matStone);
                    } else if (randomVal > 0.96) {
                        createSingleBlock(posX, blockSize, posZ, matFlower);
                    }
                }
            }

            const treeCount = 80; 
            for (let i = 0; i < treeCount; i++) {
                const x = (Math.random() - 0.5) * worldSize * blockSize;
                const z = (Math.random() - 0.5) * worldSize * blockSize;
                const posX = Math.floor(x / blockSize) * blockSize + blockSize/2;
                const posZ = Math.floor(z / blockSize) * blockSize + blockSize/2;
                
                const trunkHeight = Math.floor(Math.random() * 4) + 3;
                createTree(posX, blockSize, posZ, trunkHeight);
            }
        }

        function createSingleBlock(x, y, z, material) {
            const block = new THREE.Mesh(cubeGeo, material);
            block.position.set(x, y, z);
            block.position.divideScalar(blockSize).floor().multiplyScalar(blockSize).addScalar(blockSize / 2);
            scene.add(block);
        }

        function createTree(x, yBase, z, trunkHeight) {
            for (let i = 0; i < trunkHeight; i++) {
                const log = new THREE.Mesh(cubeGeo, matLog);
                log.position.set(x, yBase + i * blockSize, z);
                scene.add(log);
            }

            const leafBaseY = yBase + (trunkHeight - 1) * blockSize;
            for (let ix = -1; ix <= 1; ix++) {
                for (let iy = 1; iy <= 3; iy++) {
                    for (let iz = -1; iz <= 1; iz++) {
                        if (Math.abs(ix) + Math.abs(iz) > 1 && iy > 2) continue;
                        const leaf = new THREE.Mesh(cubeGeo, matLeaves);
                        leaf.position.set(x + ix * blockSize, leafBaseY + iy * blockSize, z + iz * blockSize);
                        scene.add(leaf);
                    }
                }
            }
        }

        function onKeyDown(event) {
            const code = event.code || '';
            const key = event.key ? event.key.toLowerCase() : '';

            if (code === 'KeyW' || key === 'w' || code === 'ArrowUp') moveForward = true;
            if (code === 'KeyA' || key === 'a' || code === 'ArrowLeft') moveLeft = true;
            if (code === 'KeyS' || key === 's' || code === 'ArrowDown') moveBackward = true;
            if (code === 'KeyD' || key === 'd' || code === 'ArrowRight') moveRight = true;
            if (code === 'Space' || key === ' ') {
                if (canJump === true) {
                    velocity.y += 350; 
                    playSound(150, 'sine', 0.1);
                }
                canJump = false;
            }
        }

        function onKeyUp(event) {
            const code = event.code || '';
            const key = event.key ? event.key.toLowerCase() : '';

            if (code === 'KeyW' || key === 'w' || code === 'ArrowUp') moveForward = false;
            if (code === 'KeyA' || key === 'a' || code === 'ArrowLeft') moveLeft = false;
            if (code === 'KeyS' || key === 's' || code === 'ArrowDown') moveBackward = false;
            if (code === 'KeyD' || key === 'd' || code === 'ArrowRight') moveRight = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked === true) {
                // 限制最大 delta 防止时间计算爆炸导致坐标丢失
                const delta = Math.min((time - prevTime) / 1000, 0.1);

                velocity.x -= velocity.x * 10.0 * delta; 
                velocity.z -= velocity.z * 10.0 * delta; 
                velocity.y -= 9.8 * 100.0 * delta;       

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                
                if (direction.lengthSq() > 0) {
                    direction.normalize();
                }

                const moveSpeed = 600.0; 
                if (moveForward || moveBackward) velocity.z -= direction.z * moveSpeed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * moveSpeed * delta;

                controls.moveRight(- velocity.x * delta);
                controls.moveForward(- velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                // 简单的地板碰撞检测
                if (controls.getObject().position.y < blockSize * 1.5) {
                    velocity.y = 0;
                    controls.getObject().position.y = blockSize * 1.5;
                    canJump = true;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
