<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>战术突围：3D 第一视角网页游戏</title>
  <style>
    html, body { margin:0; padding:0; overflow:hidden; background:#05070a; font-family: Arial, "Microsoft YaHei", sans-serif; }
    canvas { display:block; }
    #hud { position:fixed; inset:0; pointer-events:none; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.7); }
    #top { position:absolute; top:18px; left:20px; right:20px; display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    .panel { background:rgba(8,14,22,.48); border:1px solid rgba(120,180,255,.26); border-radius:12px; padding:10px 14px; backdrop-filter:blur(6px); box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .title { font-size:18px; font-weight:800; letter-spacing:.08em; color:#cfe8ff; }
    .sub { font-size:12px; opacity:.78; margin-top:3px; }
    #stats { font-size:15px; line-height:1.8; min-width:210px; }
    .barWrap { width:190px; height:10px; background:rgba(255,255,255,.16); border-radius:999px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:8px; }
    .bar { height:100%; width:100%; background:linear-gradient(90deg,#62f08e,#ffe66a,#ff5d5d); border-radius:999px; }
    #crosshair { position:absolute; top:50%; left:50%; width:28px; height:28px; transform:translate(-50%,-50%); }
    #crosshair:before, #crosshair:after { content:""; position:absolute; background:rgba(255,255,255,.92); box-shadow:0 0 9px rgba(70,180,255,.85); }
    #crosshair:before { left:13px; top:2px; width:2px; height:24px; }
    #crosshair:after { left:2px; top:13px; width:24px; height:2px; }
    #hit { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; border:2px solid rgba(255,230,120,0); border-radius:50%; transition:.08s; }
    #message { position:absolute; top:20%; left:50%; transform:translateX(-50%); text-align:center; font-size:28px; font-weight:900; color:#fff; opacity:0; transition:.3s; }
    #tips { position:absolute; left:20px; bottom:18px; max-width:580px; font-size:13px; line-height:1.65; opacity:.86; }
    #weapon { position:absolute; right:32px; bottom:28px; width:280px; height:135px; opacity:.93; transform:skewX(-10deg); background:linear-gradient(135deg, rgba(25,32,42,.92), rgba(8,10,14,.96)); border-radius:18px 36px 24px 18px; border:1px solid rgba(190,220,255,.25); box-shadow:0 20px 45px rgba(0,0,0,.52); }
    #weapon:before { content:""; position:absolute; left:42px; top:42px; width:170px; height:38px; background:linear-gradient(90deg,#202936,#141923); border-radius:8px; box-shadow:inset 0 0 0 2px rgba(255,255,255,.06); }
    #weapon:after { content:""; position:absolute; right:-46px; top:48px; width:82px; height:18px; background:#111821; border-radius:4px; box-shadow:0 0 18px rgba(120,190,255,.2); }
    #start { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 50% 45%, rgba(40,76,118,.72), rgba(3,5,8,.97) 58%); color:#fff; z-index:10; }
    #card { width:min(760px,92vw); text-align:center; padding:38px; border-radius:24px; background:rgba(10,16,25,.72); border:1px solid rgba(140,195,255,.28); box-shadow:0 30px 100px rgba(0,0,0,.5); }
    #card h1 { margin:0 0 10px; font-size:42px; letter-spacing:.08em; }
    #card p { color:#dcecff; line-height:1.8; }
    button { pointer-events:auto; cursor:pointer; margin-top:18px; padding:14px 32px; font-weight:800; font-size:16px; color:#06111c; border:0; border-radius:999px; background:linear-gradient(90deg,#8be9ff,#ffe36c); box-shadow:0 14px 35px rgba(100,190,255,.32); }
    #damageFlash { position:fixed; inset:0; pointer-events:none; background:rgba(255,0,0,0); transition:.12s; }
  </style>
</head>
<body>
  <div id="start">
    <div id="card">
      <h1>战术突围</h1>
      <p>第一视角 3D 网页枪战原型。点击开始后锁定鼠标。<br>WASD 移动，Shift 奔跑，鼠标转向，左键射击，R 换弹，空格跳跃。清理训练场干员并击败最终 Boss。</p>
      <button id="startBtn">进入训练场</button>
      <p style="font-size:12px;opacity:.75">提示：本原型使用 Three.js CDN，联网环境打开效果最好。</p>
    </div>
  </div>
  <div id="hud">
    <div id="top">
      <div class="panel"><div class="title">TACTICAL BREAKOUT</div><div class="sub">目标：清理干员 · 击败 Boss · 生存撤离</div></div>
      <div id="stats" class="panel">
        生命 <span id="hpTxt">100</span><span class="barWrap"><span id="hpBar" class="bar"></span></span><br>
        弹药 <b id="ammoTxt">30 / 90</b><br>
        敌人 <b id="enemyTxt">0</b>　Boss <b id="bossTxt">未出现</b>
      </div>
    </div>
    <div id="crosshair"></div><div id="hit"></div><div id="message"></div><div id="tips" class="panel">操作：WASD移动｜Shift奔跑｜鼠标视角｜左键射击｜R换弹｜空格跳跃。靠近掩体走位，Boss 出现后优先利用集装箱绕开火线。</div><div id="weapon"></div>
  </div>
  <div id="damageFlash"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

let scene, camera, renderer, clock;
let yaw = 0, pitch = 0;
let keys = {}, locked = false;
let player = { pos:new THREE.Vector3(0,1.75,18), vel:new THREE.Vector3(), hp:100, radius:.45, onGround:false };
let ammo=30, reserve=90, magSize=30, reloading=false;
let enemies=[], boss=null, bullets=[], props=[];
let score=0, gameOver=false, bossSpawned=false;
const raycaster = new THREE.Raycaster();
const mouseDir = new THREE.Vector3();
const tmp = new THREE.Vector3();

init(); animate();

document.getElementById('startBtn').onclick = () => { document.body.requestPointerLock(); };
document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === document.body; document.getElementById('start').style.display = locked ? 'none':'flex'; });
document.addEventListener('mousemove', e => { if(!locked || gameOver) return; yaw -= e.movementX * 0.0022; pitch -= e.movementY * 0.0022; pitch = Math.max(-1.35, Math.min(1.35, pitch)); });
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='KeyR') reload(); });
document.addEventListener('keyup', e => keys[e.code]=false);
document.addEventListener('mousedown', e => { if(e.button===0 && locked) shoot(); });

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x7c91a5);
  scene.fog = new THREE.Fog(0x7c91a5, 30, 125);
  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, .1, 350);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);
  clock = new THREE.Clock();

  scene.add(new THREE.HemisphereLight(0xb9d6ff, 0x35402f, 1.25));
  const sun = new THREE.DirectionalLight(0xfff0cf, 2.0); sun.position.set(-28,42,18); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=120; sun.shadow.camera.left=-55; sun.shadow.camera.right=55; sun.shadow.camera.top=55; sun.shadow.camera.bottom=-55; scene.add(sun);

  createWorld();
  for(let i=0;i<9;i++) spawnEnemy(false);
  updateHUD();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);});
}

function mat(color, rough=0.8, metal=0.0){ return new THREE.MeshStandardMaterial({color, roughness:rough, metalness:metal}); }
function box(w,h,d,x,y,z,m){ const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); mesh.position.set(x,y,z); mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh); props.push(mesh); return mesh; }
function cyl(r,h,x,y,z,m,seg=24){ const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg),m); mesh.position.set(x,y,z); mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh); props.push(mesh); return mesh; }

function createWorld(){
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(240,240,60,60), mat(0x6b6455)); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
  const grid = new THREE.GridHelper(220,44,0x343434,0x343434); grid.material.opacity=.18; grid.material.transparent=true; scene.add(grid);

  // 外墙与道路
  box(150,8,3,0,4,-44,mat(0x3f4650)); box(150,8,3,0,4,54,mat(0x3f4650)); box(3,8,100,-74,4,5,mat(0x3f4650)); box(3,8,100,74,4,5,mat(0x3f4650));
  box(14,.08,95,-25,.045,4,mat(0x34383b)); box(14,.08,95,27,.045,4,mat(0x34383b));

  // 仓库、掩体、集装箱
  box(26,14,18,-46,7,-22,mat(0x52606b)); box(18,10,24,48,5,-12,mat(0x4b555e)); box(22,12,16,48,6,31,mat(0x53606c));
  for(let i=0;i<18;i++){
    const x = (Math.random()*120-60), z = (Math.random()*78-32);
    const w = 3+Math.random()*5, h=1.6+Math.random()*3, d=3+Math.random()*6;
    box(w,h,d,x,h/2,z,mat(Math.random()>.5?0x8c6a35:0x315c70));
  }
  for(let i=0;i<12;i++) cyl(.65,2.2, Math.random()*125-62,1.1,Math.random()*85-34, mat(0x262b31), 16);

  // 远景山体和灯塔
  for(let i=0;i<9;i++){
    const cone = new THREE.Mesh(new THREE.ConeGeometry(10+Math.random()*12,18+Math.random()*20,5), mat(0x5c665e));
    cone.position.set(-105+i*28, cone.geometry.parameters.height/2-2, -86-Math.random()*16); cone.rotation.y=Math.random()*Math.PI; cone.receiveShadow=true; scene.add(cone);
  }
  for(let x of [-60,60]) for(let z of [-34,44]) { const pole=cyl(.22,11,x,5.5,z,mat(0x252b31),12); const lamp=new THREE.PointLight(0x9fdcff,.9,25); lamp.position.set(x,11.2,z); scene.add(lamp); }
}

function spawnEnemy(isBoss){
  const group = new THREE.Group();
  const uniform = mat(isBoss?0x6b2130:0x1d3348, .65, .05);
  const armor = mat(isBoss?0xb24b45:0x2d7d92, .5, .1);
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(isBoss?.72:.42,isBoss?1.5:.85,8,16), uniform); body.position.y=isBoss?1.8:1.25; body.castShadow=true; group.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(isBoss?.42:.28,16,12), mat(0xd5b38c)); head.position.y=isBoss?3.15:2.15; head.castShadow=true; group.add(head);
  const vest = new THREE.Mesh(new THREE.BoxGeometry(isBoss?1.35:.82,isBoss?.9:.55,isBoss?.45:.28), armor); vest.position.y=isBoss?2.0:1.35; vest.castShadow=true; group.add(vest);
  const gun = new THREE.Mesh(new THREE.BoxGeometry(isBoss?1.4:.9,.14,.16), mat(0x11151a,.4,.4)); gun.position.set(isBoss?.9:.62,isBoss?2.0:1.55,.25); group.add(gun);
  group.position.set(Math.random()*110-55,0,Math.random()*55-28);
  if(group.position.distanceTo(player.pos)<18) group.position.z -= 28;
  group.userData = { hp:isBoss?260:55, maxHp:isBoss?260:55, speed:isBoss?2.0:2.6, damage:isBoss?16:8, cd:0, isBoss };
  scene.add(group); if(isBoss) boss=group; else enemies.push(group);
}

function updateCamera(){
  camera.position.copy(player.pos);
  camera.rotation.order='YXZ'; camera.rotation.y=yaw; camera.rotation.x=pitch;
}
function forwardVector(){ return new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw)).normalize(); }
function rightVector(){ return new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw)).normalize(); }

function movePlayer(dt){
  const speed = keys.ShiftLeft||keys.ShiftRight ? 8.5 : 5.2;
  const dir = new THREE.Vector3();
  if(keys.KeyW) dir.add(forwardVector()); if(keys.KeyS) dir.sub(forwardVector()); if(keys.KeyD) dir.add(rightVector()); if(keys.KeyA) dir.sub(rightVector());
  if(dir.lengthSq()>0) dir.normalize().multiplyScalar(speed*dt);
  player.pos.add(dir);
  if(keys.Space && player.onGround){ player.vel.y=7.1; player.onGround=false; }
  player.vel.y -= 18*dt; player.pos.y += player.vel.y*dt;
  if(player.pos.y<1.75){ player.pos.y=1.75; player.vel.y=0; player.onGround=true; }
  player.pos.x = THREE.MathUtils.clamp(player.pos.x,-70,70); player.pos.z = THREE.MathUtils.clamp(player.pos.z,-42,50);
}

function shoot(){
  if(gameOver || reloading) return;
  if(ammo<=0){ showMessage('弹匣已空，按 R 换弹'); return; }
  ammo--; updateHUD(); flashWeapon();
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const targets = [...enemies, ...(boss?[boss]:[])];
  const hitList=[];
  for(const t of targets) t.traverse(o=>{ if(o.isMesh) hitList.push(o); });
  const hits = raycaster.intersectObjects(hitList, false);
  if(hits.length){
    let obj = hits[0].object; while(obj.parent && !obj.userData.hp) obj=obj.parent;
    if(obj.userData.hp){
      const dmg = hits[0].object.geometry.type==='SphereGeometry' ? 45 : 28;
      obj.userData.hp -= dmg; showHit();
      if(obj.userData.hp<=0) killEnemy(obj);
    }
  }
}
function killEnemy(obj){
  scene.remove(obj);
  if(obj.userData.isBoss){ boss=null; showMessage('Boss 已击败，任务完成！'); endGame(true); }
  else { enemies = enemies.filter(e=>e!==obj); score++; if(enemies.length===0 && !bossSpawned){ bossSpawned=true; showMessage('警报：Boss 干员入场'); spawnEnemy(true); } }
  updateHUD();
}
function reload(){
  if(reloading || ammo===magSize || reserve<=0) return;
  reloading=true; showMessage('换弹中...');
  setTimeout(()=>{ const need=magSize-ammo; const take=Math.min(need,reserve); ammo+=take; reserve-=take; reloading=false; updateHUD(); }, 900);
}
function flashWeapon(){ const w=document.getElementById('weapon'); w.style.filter='brightness(1.8)'; setTimeout(()=>w.style.filter='none',55); }
function showHit(){ const h=document.getElementById('hit'); h.style.borderColor='rgba(255,235,130,.95)'; h.style.transform='translate(-50%,-50%) scale(.72)'; setTimeout(()=>{h.style.borderColor='rgba(255,230,120,0)'; h.style.transform='translate(-50%,-50%) scale(1)';},90); }
function showMessage(t){ const m=document.getElementById('message'); m.textContent=t; m.style.opacity=1; clearTimeout(showMessage.t); showMessage.t=setTimeout(()=>m.style.opacity=0,1300); }
function damageFlash(){ const f=document.getElementById('damageFlash'); f.style.background='rgba(255,20,20,.24)'; setTimeout(()=>f.style.background='rgba(255,0,0,0)',120); }

function updateEnemies(dt){
  const all=[...enemies, ...(boss?[boss]:[])];
  for(const e of all){
    const data=e.userData; const toPlayer=tmp.copy(player.pos).sub(e.position); toPlayer.y=0; const dist=toPlayer.length();
    if(dist>4.2){ toPlayer.normalize(); e.position.addScaledVector(toPlayer, data.speed*dt); }
    e.lookAt(player.pos.x, e.position.y+1.4, player.pos.z);
    data.cd-=dt;
    if(dist<24 && data.cd<=0){ data.cd=data.isBoss?.55:1.05; player.hp-=data.damage; damageFlash(); updateHUD(); if(player.hp<=0) endGame(false); }
    // 简单血条
    if(!e.userData.bar){
      const bg=new THREE.Mesh(new THREE.PlaneGeometry(1.4,.12), new THREE.MeshBasicMaterial({color:0x111111, side:THREE.DoubleSide}));
      const fg=new THREE.Mesh(new THREE.PlaneGeometry(1.36,.08), new THREE.MeshBasicMaterial({color:data.isBoss?0xff4f4f:0x6cff9d, side:THREE.DoubleSide})); fg.position.z=.01; bg.add(fg); bg.position.y=data.isBoss?3.75:2.7; e.add(bg); e.userData.bar=fg;
    }
    e.userData.bar.scale.x=Math.max(.02,data.hp/data.maxHp); e.userData.bar.parent.lookAt(camera.position);
  }
}
function endGame(win){ gameOver=true; showMessage(win?'任务完成：成功撤离':'行动失败：你已倒下'); setTimeout(()=>{document.exitPointerLock?.(); document.getElementById('card').querySelector('h1').textContent=win?'任务完成':'行动失败'; document.getElementById('card').querySelector('p').innerHTML='刷新页面可以重新开始。<br>你也可以继续改代码：增加地图、武器、技能、干员职业和任务系统。';},1000); }
function updateHUD(){
  document.getElementById('hpTxt').textContent=Math.max(0,Math.round(player.hp)); document.getElementById('hpBar').style.width=Math.max(0,player.hp)+'%';
  document.getElementById('ammoTxt').textContent= ammo+' / '+reserve; document.getElementById('enemyTxt').textContent=enemies.length; document.getElementById('bossTxt').textContent=boss ? Math.max(0,Math.round(boss.userData.hp))+' HP' : (bossSpawned?'已击败':'未出现');
}
function animate(){
  requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),.04);
  if(locked && !gameOver){ movePlayer(dt); updateCamera(); updateEnemies(dt); }
  renderer.render(scene,camera);
}
</script>
</body>
</html>
