<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧宅 - 3D Horror Experience</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; color: #fff; user-select: none; }
        
        #game-container { position: relative; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; background-color: #000; overflow: hidden; }

        .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .scene.active { display: flex; }

        /* 警告页 */
        #warning-text { text-align: center; line-height: 2; font-size: 1.2vw; color: #aaa; }
        #press-any-key { margin-top: 2vw; font-size: 1.5vw; animation: blink 2s infinite; }

        /* 标题页 */
        #video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        #title-img { width: 35%; opacity: 0; transition: opacity 3s; }
        #start-btn { margin-top: 3vw; font-size: 2vw; color: #8b0000; cursor: pointer; opacity: 0; transition: opacity 4s; text-shadow: 0 0 10px #000; }

        /* 开场视频字幕 */
        #video-intro { width: 100%; height: 100%; object-fit: cover; }
        #intro-subtitle { 
            position: absolute; top: 50%; width: 100%; text-align: center; 
            font-size: 1.8vw; color: #fff; text-shadow: 0 0 15px #000; 
            display: none; pointer-events: none; 
        }
        #action-prompt { display: none; font-size: 2vw; cursor: pointer; animation: breathe 2s infinite alternate; }

        /* 3D 界面 */
        #canvas-container { width: 100%; height: 100%; display: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; 
            transform: translate(-50%, -50%); pointer-events: none; display: none;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes breathe { from { opacity: 0.5; } to { opacity: 1; } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

<div id="game-container">
    <div id="scene-warning" class="scene active">
        <div id="warning-text">
            本作包含惊悚画面、突然音效与心理恐怖元素，心脏疾病、高血压、神经衰弱者请勿游玩。<br>
            夜间游玩易产生沉浸式恐惧反应，建议开启灯光、佩戴耳机适度体验。<br>
            游戏内部分场景存在黑暗追逐、诡异人偶与灵异幻象，心理承受能力弱者请立即退出。<br>
            本作品纯属虚构，请勿将游戏场景、民俗设定代入现实生活。
        </div>
        <div id="press-any-key">按任意键进入游戏</div>
    </div>

    <div id="scene-title" class="scene">
        <video id="video-bg" loop playsinline>
            <source src="anim_opening.mp4" type="video/mp4">
        </video>
        <img id="title-img" src="title_main.png">
        <div id="start-btn">开始游戏</div>
    </div>

    <div id="scene-intro" class="scene">
        <video id="video-intro" playsinline>
            <source src="kaichang2.mp4" type="video/mp4">
        </video>
        <div id="intro-subtitle">这...好像是小时候来过的地方，那个叫小禾的女孩...</div>
        <div id="action-prompt">去宅邸躲雨</div>
    </div>

    <div id="scene-3d" class="scene">
        <div id="canvas-container"></div>
        <div id="crosshair"></div>
    </div>
</div>

<script>
    const scenes = {
        warning: document.getElementById('scene-warning'),
        title: document.getElementById('scene-title'),
        intro: document.getElementById('scene-intro'),
        game3d: document.getElementById('scene-3d')
    };

    let state = "warning";
    let camera;

    // === 1. 警告 -> 标题 ===
    window.addEventListener('keydown', () => {
        if (state !== "warning") return;
        state = "title";
        scenes.warning.classList.remove('active');
        scenes.title.classList.add('active');
        document.getElementById('video-bg').play().catch(e => {}); 
        setTimeout(() => {
            document.getElementById('title-img').style.opacity = 1;
            document.getElementById('start-btn').style.opacity = 1;
        }, 100);
    });

    // === 2. 标题 -> 开场视频 ===
    document.getElementById('start-btn').addEventListener('click', () => {
        state = "intro";
        scenes.title.classList.remove('active');
        scenes.intro.classList.add('active');
        document.getElementById('video-bg').pause();

        const vi = document.getElementById('video-intro');
        const sub = document.getElementById('intro-subtitle');
        const prompt = document.getElementById('action-prompt');

        vi.play().catch(e => {});
        vi.addEventListener('timeupdate', () => {
            if (vi.currentTime >= 7 && vi.currentTime < 12) {
                sub.style.display = 'block';
            } else if (vi.currentTime >= 12) {
                sub.style.opacity = Math.max(0, 1 - (vi.currentTime - 12));
            }
        });
        vi.addEventListener('ended', () => {
            vi.style.display = 'none';
            sub.style.display = 'none';
            prompt.style.display = 'block';
        });
    });

    // === 3. 进入 3D 场景 ===
    document.getElementById('action-prompt').addEventListener('click', () => {
        state = "3d";
        scenes.intro.classList.remove('active');
        scenes.game3d.classList.add('active');
        document.getElementById('canvas-container').style.display = 'block';
        document.getElementById('crosshair').style.display = 'block';
        init3D();
    });

    // === 4. 3D 场景与引擎 ===
    function init3D() {
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 2, 20); // 因为是在室内，雾效调近一点压迫感更强

        camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // 玩家出生点在正中心
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const collidableMeshes = [];

        // ================= 构建 25x25 纯白墙壁场景 =================
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); 
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1.0 }); // 很暗的深灰地板，凸显白墙

        // 1. 地板 (25x25)
        const floorGeo = new THREE.PlaneGeometry(25, 25);
        const floor = new THREE.Mesh(floorGeo, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        collidableMeshes.push(floor);

        // 2. 封装建墙函数
        function createWall(w, h, d, x, y, z) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, wallMaterial);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            collidableMeshes.push(mesh);
        }

        const wallHeight = 4;
        const wallY = wallHeight / 2;

        // 3. 四面外墙 (包围成 25x25 的空间)
        createWall(25, wallHeight, 1, 0, wallY, -12.5); // 北墙
        createWall(25, wallHeight, 1, 0, wallY, 12.5);  // 南墙
        createWall(1, wallHeight, 25, -12.5, wallY, 0); // 西墙
        createWall(1, wallHeight, 25, 12.5, wallY, 0);  // 东墙

        // 4. 内部迷宫墙壁 (避开 0,0,0 中心出生点)
        createWall(10, wallHeight, 1, -5, wallY, -5);
        createWall(10, wallHeight, 1, 5, wallY, 5);
        createWall(1, wallHeight, 8, -6, wallY, 5);
        createWall(1, wallHeight, 8, 6, wallY, -5);

        // ================= 灯光系统 =================
        
        // 1. 玩家初始位置的超亮大灯 (出生点指路灯)
        const spawnLight = new THREE.PointLight(0xffffff, 2.0, 30);
        spawnLight.position.set(0, 3.5, 0); 
        spawnLight.castShadow = true;
        scene.add(spawnLight);
        // 给出生灯加个发光球体实体，好认
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff}));
        bulb.position.copy(spawnLight.position);
        scene.add(bulb);

        // 2. 玩家自带的灯（点光源，无论走到哪都能照亮周围一圈）
        const playerLight = new THREE.PointLight(0xfff5d5, 0.8, 10);
        playerLight.position.set(0, 0, 0);
        playerLight.castShadow = true;
        camera.add(playerLight); 
        scene.add(camera); 

        // 3. 动态墙壁灯池 (4 个探测灯)
        const dynamicWallLights = [];
        for(let i = 0; i < 4; i++) {
            const wl = new THREE.PointLight(0xffaa55, 0, 6); 
            scene.add(wl);
            dynamicWallLights.push(wl);
        }

        // --- 控制器系统 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        container.addEventListener('click', () => controls.lock());

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();

        const onKeyDown = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 5; canJump = false; break;
            }
        };
        const onKeyUp = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        const raycaster = new THREE.Raycaster();
        function checkCollision(dir) {
            const rayOrigin = camera.position.clone();
            rayOrigin.y = 1.0; 
            raycaster.set(rayOrigin, dir);
            const intersects = raycaster.intersectObjects(collidableMeshes, false);
            return intersects.length > 0 && intersects.distance < 0.6; 
        }

        // --- 物理与动画循环 ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 2.0 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                let fwDir = new THREE.Vector3();
                controls.getDirection(fwDir);
                fwDir.y = 0;
                fwDir.normalize();

                let rightDir = new THREE.Vector3();
                rightDir.copy(fwDir).applyAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI / 2);

                if (velocity.z < 0 && checkCollision(fwDir)) velocity.z = 0; 
                if (velocity.z > 0 && checkCollision(fwDir.clone().negate())) velocity.z = 0; 
                if (velocity.x > 0 && checkCollision(rightDir)) velocity.x = 0; 
                if (velocity.x < 0 && checkCollision(rightDir.clone().negate())) velocity.x = 0; 

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                camera.position.y += (velocity.y * delta);

                if (camera.position.y < 1.6) {
                    velocity.y = 0;
                    camera.position.y = 1.6;
                    canJump = true;
                }

                // ================= 动态墙壁灯光计算 =================
                const dirs = [fwDir, fwDir.clone().negate(), rightDir, rightDir.clone().negate()];
                const rayOrigin = camera.position.clone();
                rayOrigin.y = 1.6; // 视线高度探测

                for(let i = 0; i < 4; i++) {
                    raycaster.set(rayOrigin, dirs[i]);
                    const intersects = raycaster.intersectObjects(collidableMeshes, false);
                    
                    if (intersects.length > 0 && intersects.distance < 3.5) {
                        const hit = intersects;
                        dynamicWallLights[i].position.copy(hit.point).sub(dirs[i].clone().multiplyScalar(0.2));
                        // 墙壁反光最高亮度设为 1.0
                        dynamicWallLights[i].intensity = (3.5 - hit.distance) * 0.4;
                    } else {
                        dynamicWallLights[i].intensity = 0;
                    }
                }

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    }
</script>
</body>
</html>
