<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>超自由城市 - 体力与动画系统</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: "Microsoft YaHei", sans-serif; touch-action: none; }
        
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.65); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
            backdrop-filter: blur(4px);
            min-width: 220px;
        }
        #ui-overlay h3 { margin: 0 0 8px 0; font-size: 18px; letter-spacing: 1px; }
        
        .health-container {
            margin-top: 8px;
            background: rgba(30,30,30,0.8);
            border-radius: 12px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .health-label {
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .health-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #4a0000;
            border-radius: 6px;
            overflow: hidden;
        }
        .health-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e34234, #ff6b4a);
            border-radius: 6px;
            transition: width 0.15s ease-out;
        }
        .health-text {
            font-size: 11px;
            text-align: right;
            margin-top: 3px;
            opacity: 0.9;
        }
        .stamina-container {
            margin-top: 8px;
            background: rgba(30,30,30,0.8);
            border-radius: 12px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stamina-label {
            font-size: 12px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .stamina-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #2c4a2c;
            border-radius: 6px;
            overflow: hidden;
        }
        .stamina-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4cd964, #8bff6e);
            border-radius: 6px;
            transition: width 0.15s ease-out;
        }
        .stamina-text {
            font-size: 11px;
            text-align: right;
            margin-top: 3px;
        }
        .anim-status {
            margin-top: 10px;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 5px 8px;
            text-align: center;
            border-left: 3px solid #ffaa44;
        }
        .anim-status span {
            color: #ffaa44;
            font-weight: bold;
        }

        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 50;
            cursor: pointer;
        }
        #instructions { text-align: center; font-size: 18px; line-height: 1.8; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; max-width: 90%; }
        #instructions span { font-size: 24px; font-weight: bold; color: #00d1ff; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; text-align: left; }
        .controls-grid kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #ffaa44; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 200;
        }
        #game-over h1 { font-size: 60px; margin-bottom: 20px; text-shadow: 4px 4px 0px #3a0000; }
        #game-over p { font-size: 22px; margin-bottom: 25px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 40px; }
        #restart-btn {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: white; border: none; border-radius: 5px; color: #8b0000;
            font-weight: bold; transition: 0.2s;
        }
        #restart-btn:hover { transform: scale(1.05); background: #ffe0e0; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }
        .loader {
            border: 4px solid #333; border-top: 4px solid #00d1ff;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #mobile-controls { display: none; position: fixed; inset: 0; z-index: 30; pointer-events: none; }
        #touch-look { position: absolute; inset: 0; pointer-events: auto; }
        .mobile-pad, .mobile-actions { position: absolute; bottom: max(18px, env(safe-area-inset-bottom)); display: grid; gap: 8px; pointer-events: auto; }
        .mobile-pad { left: max(18px, env(safe-area-inset-left)); grid-template-columns: repeat(3, 54px); grid-template-rows: repeat(2, 54px); }
        .mobile-actions { right: max(18px, env(safe-area-inset-right)); grid-template-columns: repeat(2, 62px); }
        .mobile-btn {
            border: 2px solid rgba(255,255,255,.7); border-radius: 18px; background: rgba(15,25,40,.62);
            color: #fff; font: 800 18px/1 "Microsoft YaHei", sans-serif; backdrop-filter: blur(6px);
            box-shadow: 0 5px 14px rgba(0,0,0,.28); touch-action: none;
        }
        .mobile-btn.active { background: rgba(0,209,255,.8); transform: scale(.95); }
        .mobile-up { grid-column: 2; }
        .mobile-left { grid-column: 1; grid-row: 2; }
        .mobile-down { grid-column: 2; grid-row: 2; }
        .mobile-right { grid-column: 3; grid-row: 2; }
        .mobile-actions .mobile-btn { height: 62px; font-size: 13px; }
        .mobile-note { display: none; }

        @media (hover: none), (pointer: coarse), (max-width: 900px) {
            #mobile-controls { display: block; }
            #ui-overlay { top: max(8px, env(safe-area-inset-top)); left: max(8px, env(safe-area-inset-left)); min-width: 150px; padding: 8px; transform: scale(.82); transform-origin: top left; }
            #ui-overlay h3, .health-text, .stamina-text, .anim-status { display: none; }
            #instructions { max-height: 88vh; overflow: auto; font-size: 14px; padding: 16px; }
            #instructions > span { font-size: 21px; }
            .controls-grid { display: none; }
            .mobile-note { display: block; margin-top: 12px; color: #baf5ff; }
            #game-over h1 { font-size: 38px; }
            #game-over p { font-size: 16px; text-align: center; }
        }
        @media (max-width: 520px) {
            .mobile-pad { grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(2, 48px); }
            .mobile-actions { grid-template-columns: repeat(2, 54px); }
            .mobile-actions .mobile-btn { height: 54px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div id="status">资源加载中...</div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <span>🏙️ 超自由城市</span><br/><br/>
            <div class="controls-grid">
                <div><kbd>W/A/S/D</kbd> 移动</div>
                <div><kbd>🖱️ 鼠标</kbd> 视角</div>
                <div><kbd>空格</kbd> 跳跃 <span style="color:#8aff8a;">(-50体力)</span></div>
                <div><kbd>左 Shift</kbd> 跑步 <span style="color:#ffaa44;">(速度↑ 体力消耗↑)</span></div>
                <div><kbd>鼠标左键</kbd> 或 <kbd>P</kbd> 攻击动画</div>
                <div><span style="color:#ffaa44;">🎬 动画自动切换</span> 根据动作</div>
            </div>
            <div style="margin-top: 12px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px;">
                ⚠️ 高度超过6米会摔伤！ &nbsp;|&nbsp; 🏃 体力低于200减速 &nbsp;|&nbsp; 体力耗尽无法移动
                <div class="mobile-note">手机：左侧方向键移动，滑动画面旋转视角，右侧按钮跳跃、奔跑和攻击。</div>
            </div>
        </div>
    </div>

    <div id="game-over">
        <h1>坠落身亡</h1>
        <p id="death-message">你没能承受冲击...</p>
        <button id="restart-btn" onclick="location.reload()">重新开始</button>
    </div>

    <div id="ui-overlay">
        <h3>🏙️ 超自由城市</h3>
        <div class="health-container">
            <div class="health-label">
                <span>❤️ 生命值</span>
                <span id="health-value">100</span>
            </div>
            <div class="health-bar-bg">
                <div class="health-bar-fill" id="health-fill" style="width: 100%;"></div>
            </div>
            <div class="health-text">跌落伤害 >6米 每米5伤害</div>
        </div>
        <div class="stamina-container">
            <div class="stamina-label">
                <span>⚡ 体力值</span>
                <span id="stamina-value">1000</span>
            </div>
            <div class="stamina-bar-bg">
                <div class="stamina-bar-fill" id="stamina-fill" style="width: 100%;"></div>
            </div>
            <div class="stamina-text">移动消耗 | 静止恢复 | 低于200减速 | 跳跃-50</div>
        </div>
        <div class="anim-status">
            🎭 当前动作: <span id="current-anim-label">待机</span>
        </div>
    </div>

    <div id="mobile-controls" aria-label="手机游戏控制">
        <div id="touch-look"></div>
        <div class="mobile-pad">
            <button class="mobile-btn mobile-up" data-code="KeyW">▲</button>
            <button class="mobile-btn mobile-left" data-code="KeyA">◀</button>
            <button class="mobile-btn mobile-down" data-code="KeyS">▼</button>
            <button class="mobile-btn mobile-right" data-code="KeyD">▶</button>
        </div>
        <div class="mobile-actions">
            <button class="mobile-btn" data-code="Space">跳跃</button>
            <button class="mobile-btn" data-code="ShiftLeft">奔跑</button>
            <button class="mobile-btn" data-action="attack">攻击</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // ==========================================
        // 数值调整区
        // ==========================================
        
        const CITY_SCALE = 1.0;        
        const MODEL_SCALE = 0.008;     
        const JUMP_FORCE = 12;         
        const GRAVITY = 35;            
        const DEAD_Y_LIMIT = -20;      
        const PLAYER_START_Y = 25;     
        const CAM_DISTANCE = 5.0;      
        const LOOK_SENSITIVITY = 0.002;
        const MIN_PITCH = -0.95;
        const MAX_PITCH = -0.15;
        
        // 血量 & 摔伤系统
        const MAX_HEALTH = 100;         
        const FALL_DAMAGE_THRESHOLD = 6.0;
        const DAMAGE_PER_METER = 5;     

        // 体力系统
        const MAX_STAMINA = 1000;        
        const STAMINA_DRAIN_RATE_WALK = 16;   // 走路消耗
        const STAMINA_DRAIN_RATE_RUN = 32;    // 跑步消耗
        const STAMINA_RECOVER_RATE = 22;      
        const STAMINA_SLOW_THRESHOLD = 200;   
        const JUMP_STAMINA_COST = 50;    
        
        // 移动速度系数
        const BASE_MOVE_ACCEL = 18;       // 基础加速度
        const RUN_SPEED_MULTIPLIER = 1.6; // 跑步速度倍数
        
        // ========== 动画索引映射 (根据实际模型调整) ==========
        const ANIM_ATTACK_IDX = 0;   // 攻击动画 (原数字1)
        const ANIM_WALK_IDX = 2;     // 走路动画 (原数字3)
        const ANIM_RUN_IDX = 3;      // 跑步动画 (原数字4)
        const ANIM_IDLE_IDX = 4;     // 待机动画 (原数字5)
        
        // ==========================================

        let scene, camera, renderer, clock, mixer, character;
        let isGameOver = false;
        let playerOnFloor = false;
        let yaw = 0, pitch = -0.45;
        
        // 血量 & 体力
        let currentHealth = MAX_HEALTH;
        let fallMaxY = PLAYER_START_Y;
        let isAirborneActive = false;
        let currentStamina = MAX_STAMINA;
        
        // 动画系统变量
        let animActions = {};
        let currentAnimState = 'idle';
        let isAttacking = false;
        let attackTimer = null;
        let currentAction = null;
        
        // 跑步标志
        let isRunning = false;
        const isTouchDevice = matchMedia('(hover: none), (pointer: coarse)').matches || navigator.maxTouchPoints > 0;
        
        const keyStates = {};
        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        
        const playerCollider = new Capsule( 
            new THREE.Vector3( 0, 0.4, 0 ), 
            new THREE.Vector3( 0, 1.2, 0 ), 
            0.4 
        );
        const worldOctree = new Octree();

        // UI元素
        let healthFillElement, healthValueElement;
        let staminaFillElement, staminaValueElement;
        let deathMessageElement;
        let animLabelSpan;

        init();

        function init() {
            setupGameText();
            
            healthFillElement = document.getElementById('health-fill');
            healthValueElement = document.getElementById('health-value');
            staminaFillElement = document.getElementById('stamina-fill');
            staminaValueElement = document.getElementById('stamina-value');
            deathMessageElement = document.getElementById('death-message');
            animLabelSpan = document.getElementById('current-anim-label');
            updateHealthUI();
            updateStaminaUI();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 1200);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isTouchDevice ? 1.25 : 2));
            renderer.shadowMap.enabled = true; 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock(); 

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.8);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2.8);
            dirLight.position.set(200, 500, 200);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 500;
            dirLight.shadow.camera.bottom = -500;
            dirLight.shadow.camera.left = -500;
            dirLight.shadow.camera.right = 500;
            dirLight.shadow.mapSize.set(isTouchDevice ? 1024 : 2048, isTouchDevice ? 1024 : 2048);
            scene.add(dirLight);

            setupInputListeners();
            loadGameAssets();

            window.addEventListener('resize', onWindowResize);
        }

        function setupInputListeners() {
            document.addEventListener('keydown', (e) => {
                keyStates[e.code] = true;
                // 跑步键: 左Shift
                if (e.code === 'ShiftLeft') isRunning = true;
            });
            document.addEventListener('keyup', (e) => {
                keyStates[e.code] = false;
                if (e.code === 'ShiftLeft') isRunning = false;
            });

            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', () => {
                if (isGameOver) return;
                if (isTouchDevice) blocker.style.display = 'none';
                else document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                blocker.style.display = document.pointerLockElement === document.body ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', (event) => {
                if (document.pointerLockElement === document.body && !isGameOver) {
                    yaw -= event.movementX * LOOK_SENSITIVITY;
                    pitch -= event.movementY * LOOK_SENSITIVITY;
                    pitch = Math.max(MIN_PITCH, Math.min(MAX_PITCH, pitch));
                }
            });

            document.addEventListener('mousedown', (event) => {
                if (event.button === 0 && document.pointerLockElement === document.body && !isGameOver) {
                    triggerAttack();
                }
            });

            document.querySelectorAll('.mobile-btn[data-code]').forEach(btn => {
                const code = btn.dataset.code;
                const press = e => {
                    e.preventDefault();
                    keyStates[code] = true;
                    if (code === 'ShiftLeft') isRunning = true;
                    btn.classList.add('active');
                };
                const release = e => {
                    e.preventDefault();
                    keyStates[code] = false;
                    if (code === 'ShiftLeft') isRunning = false;
                    btn.classList.remove('active');
                };
                btn.addEventListener('pointerdown', press);
                btn.addEventListener('pointerup', release);
                btn.addEventListener('pointercancel', release);
                btn.addEventListener('pointerleave', release);
            });
            document.querySelector('[data-action="attack"]').addEventListener('pointerdown', e => {
                e.preventDefault();
                triggerAttack();
            });

            const lookZone = document.getElementById('touch-look');
            let lookPointer = null, lastLookX = 0, lastLookY = 0;
            lookZone.addEventListener('pointerdown', e => {
                lookPointer = e.pointerId; lastLookX = e.clientX; lastLookY = e.clientY;
                lookZone.setPointerCapture(e.pointerId);
            });
            lookZone.addEventListener('pointermove', e => {
                if (e.pointerId !== lookPointer || isGameOver) return;
                yaw -= (e.clientX - lastLookX) * .006;
                pitch -= (e.clientY - lastLookY) * .006;
                pitch = Math.max(MIN_PITCH, Math.min(MAX_PITCH, pitch));
                lastLookX = e.clientX; lastLookY = e.clientY;
            });
            const stopLook = e => { if (e.pointerId === lookPointer) lookPointer = null; };
            lookZone.addEventListener('pointerup', stopLook);
            lookZone.addEventListener('pointercancel', stopLook);
        }

        // 触发攻击动画 (无伤害)
        function triggerAttack() {
            if (isGameOver) return;
            if (isAttacking) return; // 防止攻击动画叠加
            
            // 播放攻击动画
            if (animActions.attack) {
                const previousState = currentAnimState;
                isAttacking = true;
                switchToAnimation('attack', false);
                const attackClip = animActions.attack.getClip();
                const duration = attackClip.duration;
                if (attackTimer) clearTimeout(attackTimer);
                attackTimer = setTimeout(() => {
                    isAttacking = false;
                    attackTimer = null;
                    updateAnimationByMovement();
                }, duration * 1000);
            }
        }
        
        // 根据移动输入和跑步键决定动画状态 (idle/walk/run)
        function updateAnimationByMovement() {
            if (isAttacking) return;
            
            const moving = keyStates['KeyW'] || keyStates['KeyS'] || keyStates['KeyA'] || keyStates['KeyD'];
            if (!moving || !playerOnFloor) {
                if (currentAnimState !== 'idle') {
                    currentAnimState = 'idle';
                    switchToAnimation('idle');
                }
            } else {
                let shouldRun = isRunning && currentStamina > 0 && playerOnFloor;
                if (shouldRun && currentStamina >= 5) {
                    if (currentAnimState !== 'run') {
                        currentAnimState = 'run';
                        switchToAnimation('run');
                    }
                } else {
                    if (currentAnimState !== 'walk') {
                        currentAnimState = 'walk';
                        switchToAnimation('walk');
                    }
                }
            }
        }
        
        // 切换动画核心 (带淡入淡出)
        function switchToAnimation(animType, force = true) {
            if (!mixer) return;
            let newAction = null;
            if (animType === 'idle') newAction = animActions.idle;
            else if (animType === 'walk') newAction = animActions.walk;
            else if (animType === 'run') newAction = animActions.run;
            else if (animType === 'attack') newAction = animActions.attack;
            else return;
            
            if (!newAction) return;
            if (currentAction === newAction && !force) return;
            
            if (currentAction) {
                currentAction.fadeOut(0.15);
            }
            newAction.reset().fadeIn(0.15).play();
            currentAction = newAction;
            
            let label = '待机';
            if (animType === 'walk') label = '🚶 走路';
            else if (animType === 'run') label = '🏃 跑步';
            else if (animType === 'attack') label = '⚔️ 攻击';
            if (animLabelSpan) animLabelSpan.innerText = label;
        }
        
        // UI更新函数
        function updateHealthUI() {
            if (healthFillElement) {
                const percent = (currentHealth / MAX_HEALTH) * 100;
                healthFillElement.style.width = `${Math.max(0, percent)}%`;
                if (percent < 30) {
                    healthFillElement.style.background = "linear-gradient(90deg, #ff3a2f, #ff6f5e)";
                } else {
                    healthFillElement.style.background = "linear-gradient(90deg, #e34234, #ff6b4a)";
                }
            }
            if (healthValueElement) healthValueElement.innerText = Math.max(0, Math.floor(currentHealth));
        }
        
        function updateStaminaUI() {
            if (staminaFillElement) {
                const percent = (currentStamina / MAX_STAMINA) * 100;
                staminaFillElement.style.width = `${Math.max(0, percent)}%`;
            }
            if (staminaValueElement) staminaValueElement.innerText = Math.max(0, Math.floor(currentStamina));
        }
        
        function applyDamage(amount) {
            if (isGameOver) return;
            const actualDamage = Math.min(amount, MAX_HEALTH);
            currentHealth = Math.max(0, currentHealth - actualDamage);
            updateHealthUI();
            
            if (actualDamage > 0 && document.body) {
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = 0;
                flash.style.left = 0;
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.backgroundColor = 'rgba(180, 40, 40, 0.35)';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = 999;
                document.body.appendChild(flash);
                setTimeout(() => { if(flash.parentNode) flash.remove(); }, 150);
            }
            
            if (currentHealth <= 0 && !isGameOver) {
                isGameOver = true;
                if (document.pointerLockElement === document.body) document.exitPointerLock();
                const gameOverDiv = document.getElementById('game-over');
                if (deathMessageElement) deathMessageElement.innerText = "你因伤势过重而倒下...";
                gameOverDiv.style.display = 'flex';
            }
        }
        
        function modifyStamina(delta) {
            if (isGameOver) return;
            currentStamina = Math.min(MAX_STAMINA, Math.max(0, currentStamina + delta));
            updateStaminaUI();
        }
        
        function resetFallTracking() {
            isAirborneActive = false;
            fallMaxY = playerCollider.start.y;
        }
        
        function processFallDamage(landingY) {
            if (!isAirborneActive) return;
            const fallDistance = fallMaxY - landingY;
            if (fallDistance > FALL_DAMAGE_THRESHOLD) {
                let damage = (fallDistance - FALL_DAMAGE_THRESHOLD) * DAMAGE_PER_METER;
                damage = Math.min(damage, MAX_HEALTH);
                damage = Math.floor(damage);
                if (damage > 0) applyDamage(damage);
            }
            resetFallTracking();
        }

        function isMovingInput() {
            return keyStates['KeyW'] || keyStates['KeyS'] || keyStates['KeyA'] || keyStates['KeyD'];
        }

        function getStaminaSpeedFactor() {
            if (currentStamina <= 0) return 0;
            if (currentStamina < STAMINA_SLOW_THRESHOLD) {
                return Math.max(0.2, currentStamina / STAMINA_SLOW_THRESHOLD);
            }
            return 1.0;
        }

        async function loadGameAssets() {
            const manager = new THREE.LoadingManager();
            const sourceTextureFiles = new Map([
                ['banners.jpg', './source/Banners.png'],
                ['banners.png', './source/Banners.png'],
                ['graffiti.png', './source/Graffiti.png'],
                ['road_signs.png', './source/Road_Signs.png'],
                ['roads.png', './source/Roads.png'],
                ['scrolling text.png', './source/scrolling text.png'],
                ['textures1.png', './source/Textures1.png'],
                ['tiles_2.png', './source/Tiles_2.png'],
                ['tiles_2_normal.png', './source/Tiles_2_Normal.png'],
                ['tiles_2_roughness.png', './source/Tiles_2_Roughness.png']
            ]);
            manager.setURLModifier((url) => {
                const fileName = url.replace(/\\/g, '/').split('/').pop();
                const fixedName = fileName
                    .replace(/\.png\.\d+\.png$/i, '.png')
                    .replace(/\.png\.\d+$/i, '.png')
                    .toLowerCase();
                if (sourceTextureFiles.has(fixedName)) return sourceTextureFiles.get(fixedName);
                if (url.includes('.png.')) {
                    return './source/' + fileName.replace(/\.png\.\d+\.png$/i, '.png').replace(/\.png\.\d+$/i, '.png');
                }
                return url;
            });

            const fbxLoader = new FBXLoader(manager);
            const textureLoader = new THREE.TextureLoader(manager);

            try {
                updateStatus("下载城市并修复贴图路径...");
                fbxLoader.setResourcePath('./source/');
                const cityFallbackMap = await textureLoader.loadAsync('./source/Textures1.png');
                cityFallbackMap.colorSpace = THREE.SRGBColorSpace;
                cityFallbackMap.flipY = false;
                const cityFBX = await fbxLoader.loadAsync('./source/Cartoon_City_Free.fbx');
                
                cityFBX.scale.set(CITY_SCALE, CITY_SCALE, CITY_SCALE);
                cityFBX.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if(child.material) {
                            const materials = Array.isArray(child.material) ? child.material : [child.material];
                            materials.forEach((material) => {
                                material.side = THREE.DoubleSide;
                                if (!material.map) material.map = cityFallbackMap;
                                if (material.map) {
                                    material.map.colorSpace = THREE.SRGBColorSpace;
                                    material.map.flipY = false;
                                }
                                material.needsUpdate = true;
                            });
                        }
                    }
                });
                
                updateStatus("计算物理碰撞区域...");
                worldOctree.fromGraphNode(cityFBX); 
                scene.add(cityFBX);

                updateStatus("初始化人物模型及动画...");
                character = await fbxLoader.loadAsync('./renwu/renwu_Meshy_AI_Meshy_Merged_Animations.fbx');
                character.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);

                const charMat = new THREE.MeshStandardMaterial({
                    map: await textureLoader.loadAsync('./renwu/renwu_texture_0.png'),
                    metalnessMap: await textureLoader.loadAsync('./renwu/renwu_texture_0_metallic.png'),
                    normalMap: await textureLoader.loadAsync('./renwu/renwu_texture_0_normal.png'),
                    roughnessMap: await textureLoader.loadAsync('./renwu/renwu_texture_0_roughness.png'),
                    metalness: 1.0, roughness: 1.0
                });
                character.traverse(c => { if(c.isMesh) c.material = charMat; c.castShadow = true; });

                mixer = new THREE.AnimationMixer(character);
                
                // 初始化动画Action
                if (character.animations && character.animations.length > 0) {
                    console.log("可用动画数量:", character.animations.length);
                    character.animations.forEach((clip, idx) => {
                        console.log(`动画[${idx}] 名称: ${clip.name || '未命名'}, 时长: ${clip.duration}`);
                    });
                    if (character.animations.length > ANIM_ATTACK_IDX) animActions.attack = mixer.clipAction(character.animations[ANIM_ATTACK_IDX]);
                    if (character.animations.length > ANIM_WALK_IDX) animActions.walk = mixer.clipAction(character.animations[ANIM_WALK_IDX]);
                    if (character.animations.length > ANIM_RUN_IDX) animActions.run = mixer.clipAction(character.animations[ANIM_RUN_IDX]);
                    if (character.animations.length > ANIM_IDLE_IDX) animActions.idle = mixer.clipAction(character.animations[ANIM_IDLE_IDX]);
                    
                    if (!animActions.idle && character.animations.length > 0) animActions.idle = mixer.clipAction(character.animations[0]);
                    if (!animActions.walk && character.animations.length > 1) animActions.walk = mixer.clipAction(character.animations[1]);
                    if (!animActions.run && character.animations.length > 2) animActions.run = mixer.clipAction(character.animations[2]);
                    if (!animActions.attack && character.animations.length > 3) animActions.attack = mixer.clipAction(character.animations[3]);
                    
                    if (animActions.idle) {
                        currentAction = animActions.idle;
                        currentAction.play();
                        currentAnimState = 'idle';
                        if (animLabelSpan) animLabelSpan.innerText = '待机';
                    }
                } else {
                    console.warn("模型无动画");
                }

                scene.add(character);
                playerCollider.translate(new THREE.Vector3(0, PLAYER_START_Y, 0));
                resetFallTracking();

                document.getElementById('loading-screen').style.display = 'none';
                animate();

            } catch (err) {
                console.error(err);
                updateStatus("资源加载失败: " + err.message);
            }
        }

        function setupGameText() {
            document.title = "超自由城市";
            document.getElementById('status').innerText = "资源加载中...";
        }
        
        function getMoveDirection(isForward) {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            return isForward ? playerDirection : playerDirection.clone().negate();
        }
        function getSideDirection(isRight) {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            playerDirection.cross(camera.up);
            return isRight ? playerDirection : playerDirection.clone().negate();
        }

        function updatePhysics(deltaTime) {
            const wasOnGround = playerOnFloor;
            
            // 体力消耗与恢复 (地面)
            if (playerOnFloor && !isGameOver) {
                let drain = 0;
                if (isMovingInput() && currentStamina > 0) {
                    const isRunActive = isRunning && currentStamina > 0 && playerOnFloor;
                    drain = (isRunActive ? STAMINA_DRAIN_RATE_RUN : STAMINA_DRAIN_RATE_WALK) * deltaTime;
                    modifyStamina(-drain);
                } else if (!isMovingInput() && currentStamina < MAX_STAMINA) {
                    modifyStamina(STAMINA_RECOVER_RATE * deltaTime);
                }
            }
            
            let speedMultiplier = 1.0;
            const canRun = isRunning && currentStamina > 0 && playerOnFloor && isMovingInput();
            if (canRun) speedMultiplier = RUN_SPEED_MULTIPLIER;
            
            const staminaFactor = getStaminaSpeedFactor();
            let effectiveAccel = BASE_MOVE_ACCEL * staminaFactor * speedMultiplier;
            if (currentStamina <= 0) effectiveAccel = 0;
            
            const accel = deltaTime * (playerOnFloor ? effectiveAccel : effectiveAccel * 0.3);
            
            if (effectiveAccel > 0) {
                if (keyStates['KeyW']) playerVelocity.add(getMoveDirection(true).multiplyScalar(accel));
                if (keyStates['KeyS']) playerVelocity.add(getMoveDirection(false).multiplyScalar(accel));
                if (keyStates['KeyA']) playerVelocity.add(getSideDirection(false).multiplyScalar(accel));
                if (keyStates['KeyD']) playerVelocity.add(getSideDirection(true).multiplyScalar(accel));
            }
            
            let canJump = playerOnFloor && keyStates['Space'] && !isGameOver && currentStamina >= JUMP_STAMINA_COST;
            if (canJump) {
                playerVelocity.y = JUMP_FORCE;
                modifyStamina(-JUMP_STAMINA_COST);
                keyStates['Space'] = false;
            }
            
            let damping = Math.exp(-4 * deltaTime) - 1;
            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime;
                damping *= 0.1;
            }
            playerVelocity.addScaledVector(playerVelocity, damping);
            
            const deltaPos = playerVelocity.clone().multiplyScalar(deltaTime);
            playerCollider.translate(deltaPos);
            
            const result = worldOctree.capsuleIntersect(playerCollider);
            playerOnFloor = false;
            if (result) {
                playerOnFloor = result.normal.y > 0;
                if (!playerOnFloor) playerVelocity.addScaledVector(result.normal, -result.normal.dot(playerVelocity));
                playerCollider.translate(result.normal.multiplyScalar(result.depth));
            }
            
            // 摔伤检测
            if (!wasOnGround && playerOnFloor) processFallDamage(playerCollider.start.y);
            if (wasOnGround && !playerOnFloor) {
                isAirborneActive = true;
                fallMaxY = playerCollider.start.y;
            }
            if (!playerOnFloor && isAirborneActive) fallMaxY = Math.max(fallMaxY, playerCollider.start.y);
            if (playerOnFloor && isAirborneActive) resetFallTracking();
            
            if (!isAttacking) updateAnimationByMovement();
            
            if (character) {
                character.position.copy(playerCollider.start);
                character.position.y -= 0.4;
                const horizontalVel = new THREE.Vector2(playerVelocity.x, playerVelocity.z);
                if (horizontalVel.length() > 0.1 && effectiveAccel > 0) {
                    const targetAngle = Math.atan2(playerVelocity.x, playerVelocity.z);
                    let diff = targetAngle - character.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    character.rotation.y += diff * 10 * deltaTime;
                }
                if (mixer) mixer.update(deltaTime);
            }
            
            if (playerCollider.start.y < DEAD_Y_LIMIT && !isGameOver) {
                isGameOver = true;
                if (document.pointerLockElement === document.body) document.exitPointerLock();
                if (deathMessageElement) deathMessageElement.innerText = "你坠入了无尽深渊...";
                document.getElementById('game-over').style.display = 'flex';
            }
            
            const offset = new THREE.Vector3(0, 0, CAM_DISTANCE).applyEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            camera.position.copy(playerCollider.end.clone().add(offset));
            camera.lookAt(playerCollider.end);
        }
        
        function updateStatus(msg) { 
            const statusDiv = document.getElementById('status');
            if (statusDiv) statusDiv.innerText = msg; 
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            if(isGameOver) return;
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            const subSteps = 5;
            for (let i = 0; i < subSteps; i++) updatePhysics(dt / subSteps);
            renderer.render(scene, camera);
        }
    </script>
