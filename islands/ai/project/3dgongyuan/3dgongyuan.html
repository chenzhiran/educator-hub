<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超自由城市 - 体力与动画系统</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: "Microsoft YaHei", sans-serif; }
        
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.65); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
            backdrop-filter: blur(4px);
            min-width: 220px;
        }
        #ui-overlay h3 { margin: 0 0 8px 0; font-size: 18px; letter-spacing: 1px; }
        
        .health-container {
            margin-top: 8px;
            background: rgba(30,30,30,0.8);
            border-radius: 12px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .health-label {
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .health-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #4a0000;
            border-radius: 6px;
            overflow: hidden;
        }
        .health-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e34234, #ff6b4a);
            border-radius: 6px;
            transition: width 0.15s ease-out;
        }
        .health-text {
            font-size: 11px;
            text-align: right;
            margin-top: 3px;
            opacity: 0.9;
        }
        .stamina-container {
            margin-top: 8px;
            background: rgba(30,30,30,0.8);
            border-radius: 12px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stamina-label {
            font-size: 12px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .stamina-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #2c4a2c;
            border-radius: 6px;
            overflow: hidden;
        }
        .stamina-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4cd964, #8bff6e);
            border-radius: 6px;
            transition: width 0.15s ease-out;
        }
        .stamina-text {
            font-size: 11px;
            text-align: right;
            margin-top: 3px;
        }
        .anim-status {
            margin-top: 10px;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 5px 8px;
            text-align: center;
            border-left: 3px solid #ffaa44;
        }
        .anim-status span {
            color: #ffaa44;
            font-weight: bold;
        }

        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 50;
            cursor: pointer;
        }
        #instructions { text-align: center; font-size: 18px; line-height: 1.8; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; max-width: 90%; }
        #instructions span { font-size: 24px; font-weight: bold; color: #00d1ff; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; text-align: left; }
        .controls-grid kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #ffaa44; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(139, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 200;
        }
        #game-over h1 { font-size: 60px; margin-bottom: 20px; text-shadow: 4px 4px 0px #3a0000; }
        #game-over p { font-size: 22px; margin-bottom: 25px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 40px; }
        #restart-btn {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: white; border: none; border-radius: 5px; color: #8b0000;
            font-weight: bold; transition: 0.2s;
        }
        #restart-btn:hover { transform: scale(1.05); background: #ffe0e0; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }
        .loader {
            border: 4px solid #333; border-top: 4px solid #00d1ff;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* NPC动画控制面板 */
        #npc-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 20;
            background: rgba(0, 0, 0, 0.7); padding: 10px 18px; border-radius: 30px;
            backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.2);
        }
        .npc-btn {
            width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(60,60,90,0.8); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
            user-select: none;
        }
        .npc-btn:hover { background: rgba(0, 180, 230, 0.5); border-color: #00d1ff; transform: scale(1.12); }
        .npc-btn.active { background: rgba(0, 200, 255, 0.75); border-color: #00d1ff; box-shadow: 0 0 18px rgba(0,200,255,0.55); }
        #npc-anim-label {
            color: #ffaa44; font-size: 13px; text-align: center; margin-bottom: 6px;
            font-weight: bold; letter-spacing: 1px;
        }
        #npc-info {
            position: absolute; bottom: 115px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 12px; z-index: 20;
            background: rgba(0,0,0,0.65); padding: 5px 18px; border-radius: 18px;
            pointer-events: none; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div id="status">资源加载中...</div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <span>🏙️ 超自由城市</span><br/><br/>
            <div class="controls-grid">
                <div><kbd>W/A/S/D</kbd> 移动</div>
                <div><kbd>🖱️ 鼠标</kbd> 视角</div>
                <div><kbd>空格</kbd> 跳跃 <span style="color:#8aff8a;">(-17体力)</span></div>
                <div><kbd>左 Shift</kbd> 跑步 <span style="color:#ffaa44;">(速度↑ 体力消耗↓)</span></div>
                <div><kbd>鼠标左键</kbd> 或 <kbd>P</kbd> 攻击动画 <span style="color:#ffaa44;">(每次完整播放一次)</span></div>
                <div><span style="color:#ffaa44;">🎬 动画自动切换</span> 根据动作</div>
            </div>
            <div style="margin-top: 12px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px;">
                ⚠️ 高度超过6米会摔伤！ &nbsp;|&nbsp; 🏃 体力低于200减速 &nbsp;|&nbsp; 体力耗尽无法移动
            </div>
        </div>
    </div>

    <div id="game-over">
        <h1>坠落身亡</h1>
        <p id="death-message">你没能承受冲击...</p>
        <button id="restart-btn" onclick="location.reload()">重新开始</button>
    </div>

    <div id="ui-overlay">
        <h3>🏙️ 超自由城市</h3>
        <div class="health-container">
            <div class="health-label">
                <span>❤️ 生命值</span>
                <span id="health-value">100</span>
            </div>
            <div class="health-bar-bg">
                <div class="health-bar-fill" id="health-fill" style="width: 100%;"></div>
            </div>
            <div class="health-text">跌落伤害 >6米 每米5伤害</div>
        </div>
        <div class="stamina-container">
            <div class="stamina-label">
                <span>⚡ 体力值</span>
                <span id="stamina-value">1000</span>
            </div>
            <div class="stamina-bar-bg">
                <div class="stamina-bar-fill" id="stamina-fill" style="width: 100%;"></div>
            </div>
            <div class="stamina-text">移动消耗 | 静止恢复 | 低于200减速 | 跳跃-17</div>
        </div>
        <div class="anim-status">
            🎭 当前动作: <span id="current-anim-label">待机</span>
        </div>
    </div>

    <div id="npc-info">
        🤖 NPC动画预览 · 编号: <span id="npc-anim-label">---</span>
    </div>
    <div id="npc-controls">
        <!-- 数字按钮由JS动态生成 -->
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Octree } from 'three/addons/math/Octree.js';
        import { Capsule } from 'three/addons/math/Capsule.js';

        // ==========================================
        // 数值调整区
        // ==========================================
        
        const CITY_SCALE = 1.0;        
        const MODEL_SCALE = 0.008;     
        const JUMP_FORCE = 12;         
        const GRAVITY = 35;            
        const DEAD_Y_LIMIT = -20;      
        const PLAYER_START_Y = 25;     
        const CAM_DISTANCE = 5.0;      
        const LOOK_SENSITIVITY = 0.002;
        const MIN_PITCH = -0.95;
        const MAX_PITCH = -0.15;
        
        // 血量 & 摔伤系统
        const MAX_HEALTH = 100;         
        const FALL_DAMAGE_THRESHOLD = 6.0;
        const DAMAGE_PER_METER = 5;     

        // 体力系统 ———— 所有消耗值均降低为原来的1/3
        const MAX_STAMINA = 1000;        
        const STAMINA_DRAIN_RATE_WALK = 16 / 3;   // 走路消耗 (原16 → 约5.33)
        const STAMINA_DRAIN_RATE_RUN = 32 / 3;    // 跑步消耗 (原32 → 约10.67)
        const STAMINA_RECOVER_RATE = 22;          
        const STAMINA_SLOW_THRESHOLD = 200;       
        const JUMP_STAMINA_COST = 50 / 3;         // 跳跃消耗 (原50 → 约16.67)
        
        // 移动速度系数
        const BASE_MOVE_ACCEL = 18;       
        const RUN_SPEED_MULTIPLIER = 1.6; 
        
        // ========== 动画名称匹配（替代不可靠的索引） ==========
        function findAnimByKeyword(clips, keywords, excludeIndices = []) {
            let bestIdx = -1;
            let bestLen = Infinity;
            for (let i = 0; i < clips.length; i++) {
                if (excludeIndices.includes(i)) continue;
                const name = (clips[i].name || '').toLowerCase();
                for (const kw of keywords) {
                    if (name.includes(kw)) {
                        // 优先选名称更短的（避免如 walking_2 这类变体）
                        if (name.length < bestLen) {
                            bestIdx = i;
                            bestLen = name.length;
                        }
                    }
                }
            }
            return bestIdx;
        }
        // ==========================================
        
        // ==========================================

        let scene, camera, renderer, clock, mixer, character;
        let isGameOver = false;
        let playerOnFloor = false;
        let yaw = 0, pitch = -0.45;
        
        // NPC 系统 — 10个自由走动的NPC
        const NPC_COUNT = 10;
        const NPC_MOVE_SPEED = 3.5;
        const npcSpawnPositions = [
            [-20, 25, -20], [20, 25, -20], [-20, 25, 20], [20, 25, 20],
            [-30, 25, 0],  [30, 25, 0],   [0, 25, -30],  [0, 25, 30],
            [-15, 25, -10],[15, 25, 10]
        ];
        let npcTemplateAnimClips = [];     // 动画Clip数组（用于按钮标签）
        let npcList = [];                  // [{character, mixer, collider, velocity, direction, onFloor, actions, currentAction}]
        
        // 血量 & 体力
        let currentHealth = MAX_HEALTH;
        let fallMaxY = PLAYER_START_Y;
        let isAirborneActive = false;
        let currentStamina = MAX_STAMINA;
        
        // 动画系统变量
        let animActions = {};
        let currentAnimState = 'idle';
        let isAttacking = false;      // 是否正在播放攻击动画
        let attackTimer = null;       // 攻击动画结束计时器
        let currentAction = null;
        
        // 跑步标志
        let isRunning = false;
        
        const keyStates = {};
        const playerVelocity = new THREE.Vector3();
        const playerDirection = new THREE.Vector3();
        
        const playerCollider = new Capsule( 
            new THREE.Vector3( 0, 0.4, 0 ), 
            new THREE.Vector3( 0, 1.2, 0 ), 
            0.4 
        );
        const worldOctree = new Octree();

        // UI元素
        let healthFillElement, healthValueElement;
        let staminaFillElement, staminaValueElement;
        let deathMessageElement;
        let animLabelSpan;

        init();

        function init() {
            setupGameText();
            
            healthFillElement = document.getElementById('health-fill');
            healthValueElement = document.getElementById('health-value');
            staminaFillElement = document.getElementById('stamina-fill');
            staminaValueElement = document.getElementById('stamina-value');
            deathMessageElement = document.getElementById('death-message');
            animLabelSpan = document.getElementById('current-anim-label');
            updateHealthUI();
            updateStaminaUI();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 1200);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true; 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock(); 

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.8);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2.8);
            dirLight.position.set(200, 500, 200);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 500;
            dirLight.shadow.camera.bottom = -500;
            dirLight.shadow.camera.left = -500;
            dirLight.shadow.camera.right = 500;
            dirLight.shadow.mapSize.set(2048, 2048);
            scene.add(dirLight);

            setupInputListeners();
            loadGameAssets();

            window.addEventListener('resize', onWindowResize);
        }

        function setupInputListeners() {
            document.addEventListener('keydown', (e) => {
                keyStates[e.code] = true;
                if (e.code === 'ShiftLeft') isRunning = true;
                if (e.code === 'KeyP' && document.pointerLockElement === document.body && !isGameOver) {
                    triggerAttack();   // P键攻击
                }
            });
            document.addEventListener('keyup', (e) => {
                keyStates[e.code] = false;
                if (e.code === 'ShiftLeft') isRunning = false;
            });

            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', () => {
                if(!isGameOver) document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                blocker.style.display = document.pointerLockElement === document.body ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', (event) => {
                if (document.pointerLockElement === document.body && !isGameOver) {
                    yaw -= event.movementX * LOOK_SENSITIVITY;
                    pitch -= event.movementY * LOOK_SENSITIVITY;
                    pitch = Math.max(MIN_PITCH, Math.min(MAX_PITCH, pitch));
                }
            });

            document.addEventListener('mousedown', (event) => {
                if (event.button === 0 && document.pointerLockElement === document.body && !isGameOver) {
                    triggerAttack();   // 鼠标左键攻击
                }
            });
        }

        // 触发一次攻击动画，动画播放完毕后自动恢复待机/移动动画
        function triggerAttack() {
            if (isGameOver) return;
            if (!animActions.attack) return;
            // 如果已经在攻击中，则忽略本次输入（防止连击打断）
            if (isAttacking) return;
            
            // 清除之前的计时器（安全起见）
            if (attackTimer) {
                clearTimeout(attackTimer);
                attackTimer = null;
            }
            
            // 标记为攻击状态
            isAttacking = true;
            
            // 淡出当前动画（如果有）
            if (currentAction && currentAction !== animActions.attack) {
                currentAction.fadeOut(0.1);
            }
            // 重置攻击动画并从头播放
            animActions.attack.stop().reset().fadeIn(0.1).play();
            currentAction = animActions.attack;
            // 更新UI标签
            if (animLabelSpan) animLabelSpan.innerText = '⚔️ 攻击';
            
            // 获取攻击动画时长
            const attackClip = animActions.attack.getClip();
            const duration = attackClip.duration;
            
            // 设置计时器，动画结束后恢复状态
            attackTimer = setTimeout(() => {
                isAttacking = false;
                attackTimer = null;
                // 根据移动状态恢复正确的动画（待机/走路/跑步）
                updateAnimationByMovement();
            }, duration * 1000);
        }
        
        // 根据移动输入和跑步键决定动画状态 (idle/walk/run)
        function updateAnimationByMovement() {
            if (isAttacking) return;   // 攻击动画优先，不切换
            
            const moving = keyStates['KeyW'] || keyStates['KeyS'] || keyStates['KeyA'] || keyStates['KeyD'];
            if (!moving || !playerOnFloor) {
                if (currentAnimState !== 'idle') {
                    currentAnimState = 'idle';
                    switchToAnimation('idle');
                }
            } else {
                let shouldRun = isRunning && currentStamina > 0 && playerOnFloor;
                if (shouldRun && currentStamina >= 5) {
                    if (currentAnimState !== 'run') {
                        currentAnimState = 'run';
                        switchToAnimation('run');
                    }
                } else {
                    if (currentAnimState !== 'walk') {
                        currentAnimState = 'walk';
                        switchToAnimation('walk');
                    }
                }
            }
        }
        
        // 切换动画核心 (带淡入淡出)
        function switchToAnimation(animType, force = true) {
            if (!mixer) return;
            let newAction = null;
            if (animType === 'idle') newAction = animActions.idle;
            else if (animType === 'walk') newAction = animActions.walk;
            else if (animType === 'run') newAction = animActions.run;
            else return;
            
            if (!newAction) return;
            if (currentAction === newAction && !force) return;
            
            if (currentAction) {
                currentAction.fadeOut(0.15);
            }
            newAction.reset().fadeIn(0.15).play();
            currentAction = newAction;
            
            let label = '待机';
            if (animType === 'walk') label = '🚶 走路';
            else if (animType === 'run') label = '🏃 跑步';
            if (animLabelSpan) animLabelSpan.innerText = label;
        }
        
        // UI更新函数
        function updateHealthUI() {
            if (healthFillElement) {
                const percent = (currentHealth / MAX_HEALTH) * 100;
                healthFillElement.style.width = `${Math.max(0, percent)}%`;
                if (percent < 30) {
                    healthFillElement.style.background = "linear-gradient(90deg, #ff3a2f, #ff6f5e)";
                } else {
                    healthFillElement.style.background = "linear-gradient(90deg, #e34234, #ff6b4a)";
                }
            }
            if (healthValueElement) healthValueElement.innerText = Math.max(0, Math.floor(currentHealth));
        }
        
        function updateStaminaUI() {
            if (staminaFillElement) {
                const percent = (currentStamina / MAX_STAMINA) * 100;
                staminaFillElement.style.width = `${Math.max(0, percent)}%`;
            }
            if (staminaValueElement) staminaValueElement.innerText = Math.max(0, Math.floor(currentStamina));
        }
        
        function applyDamage(amount) {
            if (isGameOver) return;
            const actualDamage = Math.min(amount, MAX_HEALTH);
            currentHealth = Math.max(0, currentHealth - actualDamage);
            updateHealthUI();
            
            if (actualDamage > 0 && document.body) {
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = 0;
                flash.style.left = 0;
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.backgroundColor = 'rgba(180, 40, 40, 0.35)';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = 999;
                document.body.appendChild(flash);
                setTimeout(() => { if(flash.parentNode) flash.remove(); }, 150);
            }
            
            if (currentHealth <= 0 && !isGameOver) {
                isGameOver = true;
                if (document.pointerLockElement === document.body) document.exitPointerLock();
                const gameOverDiv = document.getElementById('game-over');
                if (deathMessageElement) deathMessageElement.innerText = "你因伤势过重而倒下...";
                gameOverDiv.style.display = 'flex';
            }
        }
        
        function modifyStamina(delta) {
            if (isGameOver) return;
            currentStamina = Math.min(MAX_STAMINA, Math.max(0, currentStamina + delta));
            updateStaminaUI();
        }
        
        function resetFallTracking() {
            isAirborneActive = false;
            fallMaxY = playerCollider.start.y;
        }
        
        function processFallDamage(landingY) {
            if (!isAirborneActive) return;
            const fallDistance = fallMaxY - landingY;
            if (fallDistance > FALL_DAMAGE_THRESHOLD) {
                let damage = (fallDistance - FALL_DAMAGE_THRESHOLD) * DAMAGE_PER_METER;
                damage = Math.min(damage, MAX_HEALTH);
                damage = Math.floor(damage);
                if (damage > 0) applyDamage(damage);
            }
            resetFallTracking();
        }

        function isMovingInput() {
            return keyStates['KeyW'] || keyStates['KeyS'] || keyStates['KeyA'] || keyStates['KeyD'];
        }

        function getStaminaSpeedFactor() {
            if (currentStamina <= 0) return 0;
            if (currentStamina < STAMINA_SLOW_THRESHOLD) {
                return Math.max(0.2, currentStamina / STAMINA_SLOW_THRESHOLD);
            }
            return 1.0;
        }

        async function loadGameAssets() {
            // 使用GLTFLoader加载城市模型 (cartoon_city_free.glb)
            const gltfLoader = new GLTFLoader();
            const fbxLoader = new FBXLoader(); // 角色仍使用FBXLoader
            const textureLoader = new THREE.TextureLoader();
            
            try {
                updateStatus("加载卡通城市模型 (GLB)...");
                
                // 加载GLB城市模型
                const gltf = await gltfLoader.loadAsync('./cartoon_city_free.glb');
                const cityModel = gltf.scene;
                cityModel.scale.set(CITY_SCALE, CITY_SCALE, CITY_SCALE);
                
                // 设置阴影和材质属性，确保双面渲染和阴影投射接收
                cityModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material) {
                            const materials = Array.isArray(child.material) ? child.material : [child.material];
                            materials.forEach((material) => {
                                material.side = THREE.DoubleSide;
                                if (material.map) {
                                    material.map.colorSpace = THREE.SRGBColorSpace;
                                }
                                material.needsUpdate = true;
                            });
                        }
                    }
                });
                
                updateStatus("计算物理碰撞区域...");
                worldOctree.fromGraphNode(cityModel);
                scene.add(cityModel);
                
                updateStatus("初始化人物模型及动画...");
                character = await fbxLoader.loadAsync('./renwu/renwu_Meshy_AI_Meshy_Merged_Animations.fbx');
                character.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
                
                // 加载角色纹理贴图
                const charMap = await textureLoader.loadAsync('./renwu/renwu_texture_0.png');
                const charMetalnessMap = await textureLoader.loadAsync('./renwu/renwu_texture_0_metallic.png');
                const charNormalMap = await textureLoader.loadAsync('./renwu/renwu_texture_0_normal.png');
                const charRoughnessMap = await textureLoader.loadAsync('./renwu/renwu_texture_0_roughness.png');
                
                const charMat = new THREE.MeshStandardMaterial({
                    map: charMap,
                    metalnessMap: charMetalnessMap,
                    normalMap: charNormalMap,
                    roughnessMap: charRoughnessMap,
                    metalness: 1.0,
                    roughness: 1.0
                });
                character.traverse(c => { 
                    if(c.isMesh) {
                        c.material = charMat;
                        c.castShadow = true;
                        c.receiveShadow = true;
                    }
                });
                
                mixer = new THREE.AnimationMixer(character);
                
                // 初始化动画Action（按名称匹配，不依赖索引顺序）
                if (character.animations && character.animations.length > 0) {
                    console.log("=== 玩家动画列表 (" + character.animations.length + "个) ===");
                    character.animations.forEach((clip, idx) => {
                        console.log(`  玩家动画[${idx}] 名称: "${clip.name}", 时长: ${clip.duration.toFixed(2)}s`);
                    });
                    
                    // 按名称逐步匹配，已占用的索引自动排除
                    const idle   = findAnimByKeyword(character.animations, ['idle', 'tpose', 'stand', '静止']);
                    const attack = findAnimByKeyword(character.animations, ['punch', 'attack', '攻击', 'hit', 'combo'], [idle]);
                    const walk   = findAnimByKeyword(character.animations, ['walk'], [idle, attack]);
                    const run    = findAnimByKeyword(character.animations, ['run', '跑步'], [idle, attack, walk]);
                    
                    // 构建名称→索引映射（环境无关，按名称精确查找）
                    const idxMap = {};
                    character.animations.forEach((clip, i) => {
                        idxMap[(clip.name || '').toLowerCase()] = i;
                    });
                    const safeGet = (name, fallbackKw) => {
                        if (idxMap[name] !== undefined) return idxMap[name];
                        const found = findAnimByKeyword(character.animations, fallbackKw);
                        return found >= 0 ? found : 0;
                    };
                    
                    // 按视觉效果用名称定位（不依赖数组顺序）
                    const _idle   = safeGet('walking',     ['idle', 'tpose', 'stand']);
                    const _walk   = safeGet('punch_combo', ['walk']);
                    const _run    = safeGet('idle_11',     ['run']);
                    const _attack = safeGet('walking_2',   ['attack', 'punch', 'hit']);
                    
                    console.log(`  名称定位: idle=${_idle}, walk=${_walk}, run=${_run}, attack=${_attack}`);
                    
                    animActions.idle  = mixer.clipAction(character.animations[_idle]);
                    animActions.walk  = mixer.clipAction(character.animations[_walk]);
                    animActions.run   = mixer.clipAction(character.animations[_run]);
                    animActions.attack= mixer.clipAction(character.animations[_attack]);
                    
                    if (animActions.idle) {
                        currentAction = animActions.idle;
                        currentAction.play();
                        currentAnimState = 'idle';
                        if (animLabelSpan) animLabelSpan.innerText = '待机';
                    }
                } else {
                    console.warn("模型无动画");
                }
                
                scene.add(character);
                playerCollider.translate(new THREE.Vector3(0, PLAYER_START_Y, 0));
                resetFallTracking();
                
                // ========== 加载NPC：fetch缓存 + 独立解析10个NPC ==========
                updateStatus("下载NPC模型数据...");
                
                // 1. 下载FBX文件到内存（仅一次网络请求）
                const fbxResponse = await fetch('./npc-y/Meshy_AI_Blocky_Boy_in_a_Blue__biped_Meshy_AI_Meshy_Merged_Animations.fbx');
                const fbxData = await fbxResponse.arrayBuffer();
                
                // 2. 加载贴图（所有NPC共用）
                updateStatus("加载NPC贴图...");
                const npcMap = await textureLoader.loadAsync('./npc-y/Meshy_AI_Blocky_Boy_in_a_Blue__biped_texture_0.png');
                const npcMetalnessMap = await textureLoader.loadAsync('./npc-y/Meshy_AI_Blocky_Boy_in_a_Blue__biped_texture_0_metallic.png');
                const npcNormalMap = await textureLoader.loadAsync('./npc-y/Meshy_AI_Blocky_Boy_in_a_Blue__biped_texture_0_normal.png');
                const npcRoughnessMap = await textureLoader.loadAsync('./npc-y/Meshy_AI_Blocky_Boy_in_a_Blue__biped_texture_0_roughness.png');
                
                const npcMat = new THREE.MeshStandardMaterial({
                    map: npcMap,
                    metalnessMap: npcMetalnessMap,
                    normalMap: npcNormalMap,
                    roughnessMap: npcRoughnessMap,
                    metalness: 1.0,
                    roughness: 1.0
                });
                
                // 3. 从缓存数据独立解析10个NPC实例
                updateStatus("生成10个NPC...");
                for (let i = 0; i < NPC_COUNT; i++) {
                    const npcChar = fbxLoader.parse(fbxData, '');
                    // 每个NPC独立设置缩放与玩家一致
                    npcChar.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
                    
                    // 应用贴图
                    npcChar.traverse(c => {
                        if (c.isMesh) {
                            c.material = npcMat;
                            c.castShadow = true;
                            c.receiveShadow = true;
                        }
                    });
                    
                    // 记录动画信息（用第一个NPC的）
                    if (i === 0 && npcChar.animations && npcChar.animations.length > 0) {
                        npcTemplateAnimClips = npcChar.animations;
                        console.log(" === NPC动画列表 (" + npcTemplateAnimClips.length + "个) ===");
                        npcTemplateAnimClips.forEach((clip, idx) => {
                            console.log(`  NPC动画[${idx}] 名称: "${clip.name}", 时长: ${clip.duration.toFixed(2)}s`);
                        });
                    }
                    
                    // 创建动画混合器（使用当前NPC自己的clips）
                    const npcMixer = new THREE.AnimationMixer(npcChar);
                    const clips = npcChar.animations || [];
                    const actions = {};
                    clips.forEach((clip, idx) => {
                        actions[idx] = npcMixer.clipAction(clip);
                    });
                    
                    // 默认播放走路动画 (索引0=走路, 索引1=跑步)
                    const walkIdx = 0;
                    let currentAction = null;
                    if (actions[walkIdx]) {
                        currentAction = actions[walkIdx];
                        currentAction.play();
                    }
                    
                    // 放置到场景
                    const pos = npcSpawnPositions[i];
                    npcChar.position.set(pos[0], pos[1], pos[2]);
                    scene.add(npcChar);
                    
                    // 碰撞体
                    const collider = new Capsule(
                        new THREE.Vector3(0, 0.4, 0),
                        new THREE.Vector3(0, 1.2, 0),
                        0.4
                    );
                    collider.translate(new THREE.Vector3(pos[0], pos[1], pos[2]));
                    
                    // 随机方向
                    const angle = Math.random() * Math.PI * 2;
                    const direction = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
                    
                    npcList.push({
                        character: npcChar,
                        mixer: npcMixer,
                        collider: collider,
                        velocity: new THREE.Vector3(),
                        direction: direction,
                        onFloor: false,
                        actions: actions,
                        currentAction: currentAction,
                        walkIdx: walkIdx,
                        activeAnimIdx: walkIdx
                    });
                }
                console.log(`已创建 ${NPC_COUNT} 个NPC，默认播放走路动画`);
                
                // 动态生成NPC动画切换按钮
                createNpcButtons();
                
                // ========================================
                
                document.getElementById('loading-screen').style.display = 'none';
                animate();
                
            } catch (err) {
                console.error("加载失败: ", err);
                updateStatus("资源加载失败: " + err.message);
            }
        }

        function setupGameText() {
            document.title = "超自由城市";
            document.getElementById('status').innerText = "资源加载中...";
        }
        
        // ========== NPC动画按钮：切换所有NPC的动画 ==========
        function createNpcButtons() {
            const container = document.getElementById('npc-controls');
            if (!container) return;
            container.innerHTML = '';

            const count = npcTemplateAnimClips.length;
            if (count === 0) {
                container.innerHTML = '<span style="color:#888;font-size:13px;">NPC无动画</span>';
                return;
            }

            for (let i = 0; i < count; i++) {
                const btn = document.createElement('button');
                btn.className = 'npc-btn';
                btn.textContent = (i + 1).toString();
                btn.title = npcTemplateAnimClips[i].name || ('动画 #' + (i + 1));
                btn.addEventListener('click', () => switchAllNpcAnimation(i));
                container.appendChild(btn);
            }

            const label = document.getElementById('npc-anim-label');
            const walkIdx = (npcTemplateAnimClips.length > 2) ? 2 : 0;
            if (label && npcTemplateAnimClips.length > 0) {
                label.innerText = npcTemplateAnimClips[walkIdx].name || ('走路 #' + (walkIdx + 1));
            }
            highlightNpcBtn(walkIdx);
        }

        function switchAllNpcAnimation(index) {
            if (index >= npcTemplateAnimClips.length || index < 0) return;
            npcList.forEach(npc => {
                if (!npc.actions[index]) return;
                if (npc.currentAction) npc.currentAction.fadeOut(0.15);
                npc.currentAction = npc.actions[index];
                npc.currentAction.reset().fadeIn(0.15).play();
                npc.activeAnimIdx = index;
            });
            const label = document.getElementById('npc-anim-label');
            if (label && npcTemplateAnimClips.length > index) {
                label.innerText = npcTemplateAnimClips[index].name || ('动画 #' + (index + 1));
            }
            highlightNpcBtn(index);
        }

        function highlightNpcBtn(index) {
            const buttons = document.querySelectorAll('.npc-btn');
            buttons.forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        // ==========================================
        
        // ========== NPC自动移动与碰撞系统 ==========
        function updateNpcs(deltaTime) {
            if (npcList.length === 0) return;
            
            npcList.forEach(npc => {
                // 重力
                npc.velocity.y -= GRAVITY * deltaTime;
                
                // 水平移动
                const hSpeed = NPC_MOVE_SPEED;
                const moveX = npc.direction.x * hSpeed * deltaTime;
                const moveZ = npc.direction.z * hSpeed * deltaTime;
                
                // 阻尼
                const damping = Math.exp(-3 * deltaTime) - 1;
                if (!npc.onFloor) {
                    npc.velocity.x += npc.velocity.x * damping * 0.1;
                    npc.velocity.z += npc.velocity.z * damping * 0.1;
                }
                npc.velocity.x += npc.velocity.x * damping;
                npc.velocity.z += npc.velocity.z * damping;
                
                // 组合位移
                const deltaPos = new THREE.Vector3(moveX, npc.velocity.y * deltaTime, moveZ);
                npc.collider.translate(deltaPos);
                
                // 碰撞检测
                const result = worldOctree.capsuleIntersect(npc.collider);
                npc.onFloor = false;
                
                if (result) {
                    npc.onFloor = result.normal.y > 0;
                    
                    if (!npc.onFloor) {
                        // 碰到墙壁 → 反弹+转向
                        npc.velocity.addScaledVector(result.normal, -result.normal.dot(npc.velocity));
                    }
                    npc.collider.translate(result.normal.multiplyScalar(result.depth));
                    
                    // 碰到非地面 → 随机转向新方向
                    if (result.normal.y < 0.3) {
                        const angle = Math.random() * Math.PI * 2;
                        npc.direction.set(Math.sin(angle), 0, Math.cos(angle));
                    }
                }
                
                // 偶尔随机转向（即使没碰撞），让移动更自然
                if (npc.onFloor && Math.random() < 0.002) {
                    const angle = Math.random() * Math.PI * 2;
                    npc.direction.set(Math.sin(angle), 0, Math.cos(angle));
                }
                
                // 防止掉出世界
                if (npc.collider.start.y < DEAD_Y_LIMIT) {
                    const spawn = npcSpawnPositions[npcList.indexOf(npc) % NPC_COUNT];
                    npc.collider.start.set(spawn[0], spawn[1] + 0.4, spawn[2]);
                    npc.collider.end.set(spawn[0], spawn[1] + 1.2, spawn[2]);
                    npc.velocity.set(0, 0, 0);
                }
                
                // 更新模型位置与朝向
                npc.character.position.copy(npc.collider.start);
                npc.character.position.y -= 0.4;
                
                if (npc.onFloor) {
                    const targetAngle = Math.atan2(npc.direction.x, npc.direction.z);
                    let diff = targetAngle - npc.character.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    npc.character.rotation.y += diff * 6 * deltaTime;
                }
            });
        }
        // ==========================================
        
        function getMoveDirection(isForward) {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            return isForward ? playerDirection : playerDirection.clone().negate();
        }
        function getSideDirection(isRight) {
            camera.getWorldDirection(playerDirection);
            playerDirection.y = 0;
            playerDirection.normalize();
            playerDirection.cross(camera.up);
            return isRight ? playerDirection : playerDirection.clone().negate();
        }

        function updatePhysics(deltaTime) {
            const wasOnGround = playerOnFloor;
            
            // 体力消耗与恢复 (地面)
            if (playerOnFloor && !isGameOver) {
                let drain = 0;
                if (isMovingInput() && currentStamina > 0) {
                    const isRunActive = isRunning && currentStamina > 0 && playerOnFloor;
                    drain = (isRunActive ? STAMINA_DRAIN_RATE_RUN : STAMINA_DRAIN_RATE_WALK) * deltaTime;
                    modifyStamina(-drain);
                } else if (!isMovingInput() && currentStamina < MAX_STAMINA) {
                    modifyStamina(STAMINA_RECOVER_RATE * deltaTime);
                }
            }
            
            let speedMultiplier = 1.0;
            const canRun = isRunning && currentStamina > 0 && playerOnFloor && isMovingInput();
            if (canRun) speedMultiplier = RUN_SPEED_MULTIPLIER;
            
            const staminaFactor = getStaminaSpeedFactor();
            let effectiveAccel = BASE_MOVE_ACCEL * staminaFactor * speedMultiplier;
            if (currentStamina <= 0) effectiveAccel = 0;
            
            const accel = deltaTime * (playerOnFloor ? effectiveAccel : effectiveAccel * 0.3);
            
            if (effectiveAccel > 0) {
                if (keyStates['KeyW']) playerVelocity.add(getMoveDirection(true).multiplyScalar(accel));
                if (keyStates['KeyS']) playerVelocity.add(getMoveDirection(false).multiplyScalar(accel));
                if (keyStates['KeyA']) playerVelocity.add(getSideDirection(false).multiplyScalar(accel));
                if (keyStates['KeyD']) playerVelocity.add(getSideDirection(true).multiplyScalar(accel));
            }
            
            let canJump = playerOnFloor && keyStates['Space'] && !isGameOver && currentStamina >= JUMP_STAMINA_COST;
            if (canJump) {
                playerVelocity.y = JUMP_FORCE;
                modifyStamina(-JUMP_STAMINA_COST);
                keyStates['Space'] = false;
            }
            
            let damping = Math.exp(-4 * deltaTime) - 1;
            if (!playerOnFloor) {
                playerVelocity.y -= GRAVITY * deltaTime;
                damping *= 0.1;
            }
            playerVelocity.addScaledVector(playerVelocity, damping);
            
            const deltaPos = playerVelocity.clone().multiplyScalar(deltaTime);
            playerCollider.translate(deltaPos);
            
            const result = worldOctree.capsuleIntersect(playerCollider);
            playerOnFloor = false;
            if (result) {
                playerOnFloor = result.normal.y > 0;
                if (!playerOnFloor) playerVelocity.addScaledVector(result.normal, -result.normal.dot(playerVelocity));
                playerCollider.translate(result.normal.multiplyScalar(result.depth));
            }
            
            // 摔伤检测
            if (!wasOnGround && playerOnFloor) processFallDamage(playerCollider.start.y);
            if (wasOnGround && !playerOnFloor) {
                isAirborneActive = true;
                fallMaxY = playerCollider.start.y;
            }
            if (!playerOnFloor && isAirborneActive) fallMaxY = Math.max(fallMaxY, playerCollider.start.y);
            if (playerOnFloor && isAirborneActive) resetFallTracking();
            
            // 根据攻击状态更新动画（攻击期间不切换）
            if (!isAttacking) updateAnimationByMovement();
            
            if (character) {
                character.position.copy(playerCollider.start);
                character.position.y -= 0.4;
                const horizontalVel = new THREE.Vector2(playerVelocity.x, playerVelocity.z);
                if (horizontalVel.length() > 0.1 && effectiveAccel > 0) {
                    const targetAngle = Math.atan2(playerVelocity.x, playerVelocity.z);
                    let diff = targetAngle - character.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    character.rotation.y += diff * 10 * deltaTime;
                }
                if (mixer) mixer.update(deltaTime);
            }
            
            // 更新所有NPC
            updateNpcs(deltaTime);
            
            if (playerCollider.start.y < DEAD_Y_LIMIT && !isGameOver) {
                isGameOver = true;
                if (document.pointerLockElement === document.body) document.exitPointerLock();
                if (deathMessageElement) deathMessageElement.innerText = "你坠入了无尽深渊...";
                document.getElementById('game-over').style.display = 'flex';
            }
            
            const offset = new THREE.Vector3(0, 0, CAM_DISTANCE).applyEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            camera.position.copy(playerCollider.end.clone().add(offset));
            camera.lookAt(playerCollider.end);
        }
        
        function updateStatus(msg) { 
            const statusDiv = document.getElementById('status');
            if (statusDiv) statusDiv.innerText = msg; 
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            if (isGameOver) {
                const dt = Math.min(0.05, clock.getDelta());
                npcList.forEach(npc => { if (npc.mixer) npc.mixer.update(dt); });
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
                return;
            }
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());
            const subSteps = 5;
            for (let i = 0; i < subSteps; i++) updatePhysics(dt / subSteps);
            npcList.forEach(npc => { if (npc.mixer) npc.mixer.update(dt); });
            renderer.render(scene, camera);
        }
    </script>
